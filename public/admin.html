<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip IQ — Admin</title>
<script src="/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;
  --accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;
  --orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;
  --grad:linear-gradient(135deg,#00c8f8,#00e5c8);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,.008) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,.008) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* AUTH */
#authGate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:32px;width:340px;text-align:center}
.auth-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.auth-sub{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:20px}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:11px 14px;font-family:'JetBrains Mono';font-size:12px;outline:none;margin-bottom:10px;letter-spacing:2px}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:11px;font-weight:700;letter-spacing:2px;padding:12px;border-radius:7px;border:none;cursor:pointer}
.auth-err{color:var(--red);font-family:'JetBrains Mono';font-size:9px;margin-top:8px;display:none}

/* LAYOUT */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-meta{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px}
.btn-refresh{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.25);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all .2s}
.btn-refresh:hover{background:rgba(0,200,248,.2)}
.page{max-width:1400px;margin:0 auto;padding:20px 24px;position:relative;z-index:1}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:28px}
.sec-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:2px;color:var(--text3)}
.sec-line{flex:1;height:1px;background:var(--border)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:8px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.accent::before{background:var(--grad)}
.kpi.green::before{background:var(--green)}
.kpi.gold::before{background:var(--gold)}
.kpi.red::before{background:var(--red)}
.kpi.purple::before{background:var(--purple)}
.kpi-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.kpi-val{font-family:'Bebas Neue';font-size:32px;line-height:1;color:var(--text)}
.kpi-val.accent{color:var(--accent)}
.kpi-val.green{color:var(--green)}
.kpi-val.gold{color:var(--gold)}
.kpi-val.red{color:var(--red)}
.kpi-val.purple{color:var(--purple)}
.kpi-sub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);margin-top:4px}

/* PLAN BREAKDOWN */
.plan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.plan-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.plan-name{font-family:'Bebas Neue';font-size:14px;letter-spacing:2px;margin-bottom:4px}
.plan-count{font-family:'Bebas Neue';font-size:28px;line-height:1}
.plan-mrr{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-top:4px}
.plan-price{font-family:'JetBrains Mono';font-size:8px;color:var(--text3)}
.plan-free .plan-name{color:var(--text3)}
.plan-starter .plan-name{color:var(--teal)}
.plan-basic .plan-name{color:var(--accent)}
.plan-plus .plan-name{color:var(--orange)}
.plan-pro .plan-name{color:var(--purple)}
.plan-elite .plan-name{color:var(--gold)}
.plan-platinum .plan-name{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* MRR BAR */
.mrr-bar-wrap{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:10px}
.mrr-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mrr-bar-lbl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;width:72px;flex-shrink:0}
.mrr-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.mrr-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.mrr-bar-num{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);width:60px;text-align:right;flex-shrink:0}

/* TABLE */
.table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3)}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;color:var(--text3);padding:8px 14px;text-align:left;font-weight:400}
td{font-size:12px;color:var(--text2);padding:9px 14px;border-bottom:1px solid rgba(14,32,64,.6)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,200,248,.03);color:var(--text)}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px}
.badge-free{background:rgba(58,90,122,.15);color:var(--text3);border:1px solid var(--border)}
.badge-starter{background:rgba(0,229,200,.1);color:var(--teal);border:1px solid rgba(0,229,200,.25)}
.badge-basic{background:rgba(0,200,248,.1);color:var(--accent);border:1px solid rgba(0,200,248,.25)}
.badge-plus{background:rgba(255,140,66,.1);color:var(--orange);border:1px solid rgba(255,140,66,.25)}
.badge-pro{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.25)}
.badge-elite{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.25)}
.badge-platinum{background:rgba(0,200,248,.15);color:var(--accent);border:1px solid var(--accent)}
.badge-active{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.25)}
.badge-cancelled{background:rgba(255,59,92,.1);color:var(--red);border:1px solid rgba(255,59,92,.25)}

/* TWO-COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'JetBrains Mono';font-size:10px;color:var(--text3);letter-spacing:1px}
.err-box{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.25);color:var(--red);font-family:'JetBrains Mono';font-size:10px;padding:14px 16px;border-radius:8px;margin-top:20px}

/* CREDIT RING */
.credit-ring-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.credit-ring{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.credit-ring-num{font-family:'Bebas Neue';font-size:30px;line-height:1}
.credit-ring-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:4px}

@media(max-width:900px){.two-col{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate">
  <div class="auth-card">
    <div class="auth-title">SLIP IQ</div>
    <div class="auth-sub">ADMIN DASHBOARD · RESTRICTED</div>
    <input class="auth-input" type="password" id="adminKeyInput" placeholder="ENTER ADMIN KEY" onkeydown="if(event.key==='Enter')tryAuth()">
    <button class="auth-btn" onclick="tryAuth()">⚡ ACCESS DASHBOARD</button>
    <div class="auth-err" id="authErr">Invalid admin key</div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" style="display:none" id="appTopbar">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="topbar-logo">⚡ SLIP IQ ADMIN</div>
    <div class="topbar-meta" id="generatedAt">—</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-meta" id="regardNote" style="color:var(--teal)">REGARD = YES ONLY</div>
    <button class="btn-refresh" onclick="loadStats()">⟳ REFRESH</button>
    <a href="home.html" class="btn-refresh" style="text-decoration:none">← HOME</a>
  </div>
</div>

<!-- MAIN -->
<div class="page" id="appPage" style="display:none">

  <!-- LOADING STATE -->
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">LOADING ADMIN STATS...</div>
  </div>

  <div id="dashContent" style="display:none">

    <!-- TOP KPIs -->
    <div class="sec-hdr" style="margin-top:8px"><div class="sec-title">OVERVIEW</div><div class="sec-line"></div></div>
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- REVENUE -->
    <div class="sec-hdr"><div class="sec-title">REVENUE</div><div class="sec-line"></div></div>
    <div class="two-col">
      <div class="plan-grid" id="planGrid"></div>
      <div class="mrr-bar-wrap" id="mrrBars"></div>
    </div>

    <!-- CREDITS -->
    <div class="sec-hdr"><div class="sec-title">CREDITS USAGE</div><div class="sec-line"></div></div>
    <div class="credit-ring-row" id="creditRings"></div>

    <!-- PARLAY STATS -->
    <div class="sec-hdr"><div class="sec-title">PARLAY PERFORMANCE</div><div class="sec-line"></div></div>
    <div class="kpi-grid" id="parlayKpis"></div>

    <!-- ACTIVITY -->
    <div class="sec-hdr"><div class="sec-title">ACTIVITY & GROWTH</div><div class="sec-line"></div></div>
    <div class="kpi-grid" id="activityKpis"></div>

    <!-- TABLES -->
    <div class="sec-hdr"><div class="sec-title">RECENT SIGNUPS</div><div class="sec-line"></div></div>
    <div class="table-wrap" id="recentTable"></div>

    <div class="sec-hdr"><div class="sec-title">TOP WINNERS</div><div class="sec-line"></div></div>
    <div class="table-wrap" id="winnersTable"></div>

    <div class="sec-hdr"><div class="sec-title">MOST ACTIVE USERS</div><div class="sec-line"></div></div>
    <div class="table-wrap" id="activeTable"></div>

  </div>
</div>

<script>
var ADMIN_KEY = ''
var PLAN_PRICES = { free:0, starter:2.99, basic:4.99, plus:14.99, pro:39.99, elite:79.99, platinum:149.99 }

function tryAuth() {
  var key = document.getElementById('adminKeyInput').value.trim()
  if (!key) { showAuthErr('Enter admin key'); return }
  ADMIN_KEY = key

  document.getElementById('authGate').style.display = 'none'
  document.getElementById('appTopbar').style.display = 'flex'
  document.getElementById('appPage').style.display = 'block'
  document.getElementById('loadingState').style.display = 'flex'
  document.getElementById('dashContent').style.display = 'none'

  Promise.all([
    fetch('/admin/stats', { headers: { 'x-admin-key': key } }),
    fetch('/admin/users', { headers: { 'x-admin-key': key } })
  ])
    .then(function(responses) {
      if (responses[0].status === 401) {
        document.getElementById('authGate').style.display = 'flex'
        document.getElementById('appTopbar').style.display = 'none'
        document.getElementById('appPage').style.display = 'none'
        showAuthErr('Invalid admin key')
        return null
      }
      return Promise.all(responses.map(function(r) { return r.json() }))
    })
    .then(function(results) {
      if (!results) return
      renderDash(results[0], results[1] || [])
    })
    .catch(function(e) {
      document.getElementById('loadingState').innerHTML = '<div class="err-box">Connection failed: ' + e.message + '</div>'
    })
}

function showAuthErr(msg) {
  var el = document.getElementById('authErr')
  el.textContent = msg
  el.style.display = 'block'
}

function loadStats() {
  document.getElementById('dashContent').style.display = 'none'
  document.getElementById('loadingState').style.display = 'flex'
  Promise.all([
    fetch('/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } }).then(function(r){ return r.json() }),
    fetch('/admin/users', { headers: { 'x-admin-key': ADMIN_KEY } }).then(function(r){ return r.json() }).catch(function(){ return [] })
  ])
    .then(function(results) { renderDash(results[0], results[1] || []) })
    .catch(function(e) {
      document.getElementById('loadingState').innerHTML = '<div class="err-box">Failed to load: ' + e.message + '</div>'
    })
}

function planBadge(plan) {
  return '<span class="badge badge-' + (plan||'free') + '">' + (plan||'free').toUpperCase() + '</span>'
}
function statusBadge(s) {
  return '<span class="badge badge-' + (s==='active'?'active':'cancelled') + '">' + (s||'?').toUpperCase() + '</span>'
}
function fmt(d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})
}
function fmtDT(d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
}
function mask(email) {
  if (!email) return '—'
  var parts = email.split('@')
  if (parts.length < 2) return email
  var name = parts[0]
  var masked = name.slice(0,2) + '***' + (name.length > 4 ? name.slice(-1) : '')
  return masked + '@' + parts[1]
}
function kpi(label, value, cls, sub) {
  return '<div class="kpi ' + (cls||'') + '"><div class="kpi-lbl">' + label + '</div><div class="kpi-val ' + (cls||'') + '">' + value + '</div>' + (sub?'<div class="kpi-sub">'+sub+'</div>':'') + '</div>'
}

function renderDash(d, allUsers) {
  allUsers = allUsers || []
  document.getElementById('loadingState').style.display = 'none'
  document.getElementById('dashContent').style.display = 'block'
  document.getElementById('generatedAt').textContent = 'UPDATED ' + fmtDT(d.generatedAt)

  // ── KPIs ──
  document.getElementById('kpiGrid').innerHTML = [
    kpi('TOTAL USERS', d.totalUsers, 'accent', 'regard = yes only'),
    kpi('PAID USERS', d.paidUsers, 'green', d.conversionRate + '% conversion'),
    kpi('FREE USERS', d.freeUsers, '', ''),
    kpi('MRR', '$' + d.mrr.toLocaleString(), 'gold', 'ARR: $' + d.arr.toLocaleString()),
    kpi('CHURNED', d.churned, 'red', 'cancelled / expired'),
    kpi('CONVERSION', d.conversionRate + '%', 'purple', 'free → paid'),
    kpi('REFERRAL RATE', d.referralConvRate + '%', 'accent', d.usersWithReferral + ' used a code'),
    kpi('OUT OF CREDITS', d.usersOutOfCredits, 'red', 'upgrade candidates'),
  ].join('')

  // ── PLAN BREAKDOWN ──
  var planColors = { free:'#3a5a7a', starter:'#00e5c8', basic:'#00c8f8', plus:'#ff8c42', pro:'#a855f7', elite:'#ffd700', platinum:'#00c8f8' }
  document.getElementById('planGrid').innerHTML = (d.planRevenue || []).map(p =>
    '<div class="plan-card plan-' + p.plan + '">' +
    '<div class="plan-name">' + p.plan.toUpperCase() + '</div>' +
    '<div class="plan-count" style="color:' + (planColors[p.plan]||'#fff') + '">' + p.count + '</div>' +
    '<div class="plan-mrr">$' + p.mrr.toFixed(2) + '/mo MRR</div>' +
    '<div class="plan-price">@ $' + p.price + '/user</div>' +
    '</div>'
  ).join('')

  // ── MRR BARS ──
  var maxMrr = Math.max(...(d.planRevenue || []).map(p => p.mrr), 1)
  document.getElementById('mrrBars').innerHTML =
    '<div class="table-title" style="font-family:\'JetBrains Mono\';font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:12px">MRR BREAKDOWN</div>' +
    (d.planRevenue || []).filter(p => p.price > 0).map(p => {
      var pct = Math.round(p.mrr / maxMrr * 100)
      return '<div class="mrr-bar-row">' +
        '<span class="mrr-bar-lbl" style="color:' + (planColors[p.plan]||'#fff') + '">' + p.plan.toUpperCase() + '</span>' +
        '<div class="mrr-bar-track"><div class="mrr-bar-fill" style="width:' + pct + '%;background:' + (planColors[p.plan]||'#fff') + '"></div></div>' +
        '<span class="mrr-bar-num">$' + p.mrr.toFixed(0) + '</span>' +
        '</div>'
    }).join('') +
    '<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between">' +
    '<span style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">TOTAL MRR</span>' +
    '<span style="font-family:\'Bebas Neue\';font-size:18px;color:var(--gold)">$' + d.mrr.toFixed(2) + '</span>' +
    '</div>'

  // ── CREDITS ──
  document.getElementById('creditRings').innerHTML =
    '<div class="credit-ring"><div class="credit-ring-num" style="color:var(--accent)">' + (d.creditsUsed||0).toLocaleString() + '</div><div class="credit-ring-lbl">TOTAL CREDITS USED</div></div>' +
    '<div class="credit-ring"><div class="credit-ring-num" style="color:var(--green)">' + (d.creditsBonus||0).toLocaleString() + '</div><div class="credit-ring-lbl">BONUS CREDITS AWARDED</div></div>' +
    '<div class="credit-ring"><div class="credit-ring-num" style="color:var(--red)">' + (d.usersOutOfCredits||0) + '</div><div class="credit-ring-lbl">USERS OUT OF CREDITS</div></div>'

  // ── PARLAY ──
  document.getElementById('parlayKpis').innerHTML = [
    kpi('TOTAL PARLAYS', (d.totalParlays||0).toLocaleString(), 'accent', 'across all users'),
    kpi('WON PARLAYS', (d.wonParlays||0).toLocaleString(), 'green', ''),
    kpi('LOST PARLAYS', (d.lostParlays||0).toLocaleString(), 'red', ''),
    kpi('WIN RATE', (d.winRate||0) + '%', d.winRate >= 50 ? 'green' : 'red', 'overall parlay success'),
    kpi('BIGGEST WIN', (d.biggestWin||0) + 'x', 'gold', 'odds'),
  ].join('')

  // ── ACTIVITY ──
  document.getElementById('activityKpis').innerHTML = [
    kpi('NEW (30 DAYS)', d.newUsersLast30, 'green', 'signups this month'),
    kpi('NEW (7 DAYS)', d.newUsersLast7, 'accent', 'signups this week'),
    kpi('ACTIVE TODAY', d.activeToday, 'teal', 'seen in last 24h'),
    kpi('ACTIVE (7 DAYS)', d.activeThisWeek, 'purple', 'seen this week'),
  ].join('')

  // ── RECENT SIGNUPS TABLE ──
  document.getElementById('recentTable').innerHTML =
    '<div class="table-hdr"><div class="table-title">RECENT SIGNUPS</div></div>' +
    '<table><thead><tr>' +
    '<th>EMAIL</th><th>PLAN</th><th>STATUS</th><th>CREDITS USED</th><th>PARLAYS</th><th>JOINED</th><th>LAST SEEN</th>' +
    '</tr></thead><tbody>' +
    (d.recentSignups || []).map(u =>
      '<tr><td style="color:var(--text)">' + mask(u.email) + '</td>' +
      '<td>' + planBadge(u.plan) + '</td>' +
      '<td>' + statusBadge(u.plan_status) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.credits_used||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.total_parlays||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmt(u.joined_at) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmtDT(u.last_seen_at) + '</td>' +
      '</tr>'
    ).join('') +
    '</tbody></table>'

  // ── WINNERS TABLE ──
  document.getElementById('winnersTable').innerHTML =
    '<div class="table-hdr"><div class="table-title">TOP WINNERS BY BEST ODDS</div></div>' +
    '<table><thead><tr>' +
    '<th>EMAIL</th><th>PLAN</th><th>BIGGEST WIN</th><th>PARLAYS</th><th>WON</th><th>BEST STREAK</th>' +
    '</tr></thead><tbody>' +
    (d.topWinners || []).map((u, i) =>
      '<tr><td style="color:var(--text)">' + (i === 0 ? '🏆 ' : '') + mask(u.email) + '</td>' +
      '<td>' + planBadge(u.plan) + '</td>' +
      '<td style="font-family:\'Bebas Neue\';font-size:18px;color:var(--gold)">' + (u.biggest_win_odds||0) + 'x</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.total_parlays||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px;color:var(--green)">' + (u.won_parlays||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px;color:var(--orange)">' + (u.streak_best||0) + '</td>' +
      '</tr>'
    ).join('') +
    '</tbody></table>'

  // ── MOST ACTIVE TABLE ──
  document.getElementById('activeTable').innerHTML =
    '<div class="table-hdr"><div class="table-title">MOST ACTIVE — BY CREDITS USED</div></div>' +
    '<table class="standings-table"><thead><tr>' +
    '<th>EMAIL</th><th>PLAN</th><th>CREDITS USED</th><th>PARLAYS</th><th>LAST SEEN</th>' +
    '</tr></thead><tbody>' +
    (d.mostActive || []).map(u =>
      '<tr><td style="color:var(--text)">' + mask(u.email) + '</td>' +
      '<td>' + planBadge(u.plan) + '</td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">' +
        '<div style="height:100%;background:var(--accent);width:' + Math.min(100, Math.round((u.credits_used||0)/200*100)) + '%"></div>' +
        '</div>' +
        '<span style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.credits_used||0) + '</span>' +
        '</div>' +
      '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.total_parlays||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmtDT(u.last_seen_at) + '</td>' +
      '</tr>'
    ).join('') +
    '</tbody></table>'

  // ── FULL USER TABLE ──
  var sec = document.getElementById('fullUsersSection')
  if (!sec) {
    sec = document.createElement('div')
    sec.id = 'fullUsersSection'
    document.getElementById('dashContent').appendChild(sec)
  }

  var usersToShow = allUsers.length ? allUsers : (d.recentSignups || [])
  var planTotals = {}
  usersToShow.forEach(function(u) { planTotals[u.plan] = (planTotals[u.plan]||0)+1 })

  sec.innerHTML =
    '<div class="sec-hdr" style="margin-top:28px"><div class="sec-title">ALL USERS (' + usersToShow.length + ')</div><div class="sec-line"></div></div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">' +
    Object.entries(planTotals).map(function(kv){
      return '<div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 12px;text-align:center">' +
        '<div class="kpi-val" style="font-size:20px">' + kv[1] + '</div>' +
        '<div class="kpi-lbl">' + kv[0].toUpperCase() + '</div></div>'
    }).join('') +
    '</div>' +
    '<div style="margin-bottom:8px;display:flex;gap:8px;align-items:center">' +
    '<input type="text" id="userSearchBox" placeholder="Search email / name..." oninput="filterUserTable(this.value)" style="background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:5px;font-family:\'JetBrains Mono\';font-size:10px;padding:5px 10px;outline:none;width:220px">' +
    '<select id="userPlanFilter" onchange="filterUserTable(document.getElementById(\'userSearchBox\').value)" style="background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:5px;font-family:\'JetBrains Mono\';font-size:9px;padding:5px 8px;outline:none">' +
    '<option value="">All Plans</option>' +
    ['free','starter','basic','plus','pro','elite','platinum'].map(function(p){ return '<option>' + p + '</option>' }).join('') +
    '</select></div>' +
    '<div class="table-wrap"><table><thead><tr>' +
    '<th>EMAIL / NAME</th><th>PLAN</th><th>STATUS</th><th>CREDITS</th><th>PARLAYS W/L</th><th>BEST ODDS</th><th>STREAK</th><th>SPORTS UNLOCKED</th><th>JOINED</th><th>LAST SEEN</th>' +
    '</tr></thead><tbody id="userTableBody">' +
    renderUserRows(usersToShow) +
    '</tbody></table></div>'

  window._adminAllUsers = usersToShow
}

function renderUserRows(users) {
  if (!users.length) return '<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:20px;font-family:\'JetBrains Mono\';font-size:10px">No users found.</td></tr>'
  var planMax = { free:25, starter:55, basic:55, plus:115, pro:265, elite:900, platinum:999999 }
  return users.map(function(u) {
    var monthly = u.monthly_credits || planMax[u.plan] || 25
    var available = u.plan === 'platinum' ? '∞' : Math.max(0, monthly - (u.credits_used||0) + (u.credits_bonus||0))
    var wonPct = (u.total_parlays||0) > 0 ? Math.round((u.won_parlays||0)/(u.total_parlays||1)*100) + '%' : '—'
    var sports = (u.unlocked_sports||[]).length ? (u.unlocked_sports||[]).join(', ') : '—'
    var streak = (u.streak_current||0) > 0
      ? '<span style="color:var(--green)">' + u.streak_current + '🔥</span>'
      : (u.streak_best||0) > 0 ? 'Best: ' + u.streak_best : '—'
    var statusDot = u.plan_status === 'active'
      ? '<span style="color:var(--green)">●</span>'
      : '<span style="color:var(--red)">●</span>'
    return '<tr>' +
      '<td><div style="color:var(--text);font-weight:500">' + mask(u.email||'') + '</div>' +
        '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">' + esc(u.full_name||u.display_name||'') + '</div></td>' +
      '<td>' + planBadge(u.plan) + '</td>' +
      '<td>' + statusDot + ' ' + (u.plan_status||'active') + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px">' +
        '<span style="color:var(--accent)">' + available + '</span>' +
        '<span style="color:var(--text3)"> / ' + monthly + '</span>' +
        (u.credits_bonus > 0 ? '<div style="font-size:8px;color:var(--gold)">+' + u.credits_bonus + ' bonus</div>' : '') +
      '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px">' +
        '<span style="color:var(--green)">' + (u.won_parlays||0) + 'W</span>' +
        ' / <span style="color:var(--red)">' + (u.lost_parlays||0) + 'L</span>' +
        ' <span style="color:var(--text3)">(' + wonPct + ')</span>' +
      '</td>' +
      '<td style="font-family:\'Bebas Neue\';font-size:16px;color:var(--gold)">' + ((u.biggest_win_odds||0) > 0 ? u.biggest_win_odds + 'x' : '—') + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px">' + streak + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--teal)">' + sports + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmt(u.joined_at) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmtDT(u.last_seen_at) + '</td>' +
      '</tr>'
  }).join('')
}

function filterUserTable(q) {
  var users = window._adminAllUsers || []
  var planFilter = (document.getElementById('userPlanFilter')||{}).value || ''
  var qLow = (q||'').toLowerCase()
  var filtered = users.filter(function(u) {
    var matchQ = !qLow || (u.email||'').toLowerCase().includes(qLow) || (u.full_name||'').toLowerCase().includes(qLow) || (u.display_name||'').toLowerCase().includes(qLow)
    var matchPlan = !planFilter || u.plan === planFilter
    return matchQ && matchPlan
  })
  var tbody = document.getElementById('userTableBody')
  if (tbody) tbody.innerHTML = renderUserRows(filtered)
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
    '<div class="table-hdr"><div class="table-title">MOST ACTIVE — BY CREDITS USED</div></div>' +
    '<table><thead><tr>' +
    '<th>EMAIL</th><th>PLAN</th><th>CREDITS USED</th><th>PARLAYS</th><th>LAST SEEN</th>' +
    '</tr></thead><tbody>' +
    (d.mostActive || []).map(u =>
      '<tr><td style="color:var(--text)">' + mask(u.email) + '</td>' +
      '<td>' + planBadge(u.plan) + '</td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">' +
        '<div style="height:100%;background:var(--accent);width:' + Math.min(100, Math.round((u.credits_used||0)/200*100)) + '%"></div>' +
        '</div>' +
        '<span style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.credits_used||0) + '</span>' +
        '</div>' +
      '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:11px">' + (u.total_parlays||0) + '</td>' +
      '<td style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">' + fmtDT(u.last_seen_at) + '</td>' +
      '</tr>'
    ).join('') +
    '</tbody></table>'


// Auto-load if ADMIN_KEY is in URL (for bookmarking)
window.addEventListener('DOMContentLoaded', () => {
  var params = new URLSearchParams(location.search)
  var k = params.get('key')
  if (k) {
    document.getElementById('adminKeyInput').value = k
    tryAuth()
  }
})
</script>
