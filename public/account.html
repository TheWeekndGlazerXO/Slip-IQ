<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLIP IQ — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#070a0f;--bg2:#0d1117;--panel:#0f1822;--border:#1e2d3d;--border2:#243547;--accent:#00d4ff;--accent2:#0099cc;--green:#00ff88;--red:#ff3b5c;--orange:#ff8c42;--gold:#ffd700;--text:#e8f0fe;--text2:#8899aa;--text3:#556677;--purple:#9b6dff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:999}
.header{background:linear-gradient(180deg,#050810 0%,transparent 100%);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.logo{font-family:'Bebas Neue';font-size:24px;color:var(--accent);letter-spacing:4px;text-decoration:none}
.header-right{display:flex;gap:8px;align-items:center;margin-left:auto}
.nav-link{padding:4px 12px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid transparent;color:var(--text2);text-decoration:none;font-family:'JetBrains Mono';text-transform:uppercase;transition:all .2s;cursor:pointer;background:none}
.nav-link:hover{color:var(--accent);border-color:var(--border2)}
.btn-login{border:1px solid var(--border2);color:var(--text2);background:transparent;padding:5px 14px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono';text-transform:uppercase}
.btn-signup{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;padding:5px 14px;border-radius:4px;font-size:10px;font-weight:800;cursor:pointer;font-family:'JetBrains Mono';text-transform:uppercase}
.container{max-width:900px;margin:0 auto;padding:32px 20px}
/* GATE */
.gate{text-align:center;padding:80px 20px}
.gate-icon{font-size:48px;margin-bottom:16px}
.gate-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:3px;color:var(--text);margin-bottom:8px}
.gate-text{font-size:13px;color:var(--text2);margin-bottom:22px}
.gate-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;padding:11px 24px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Space Grotesk'}
/* PROFILE HERO */
.profile-hero{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;display:flex;align-items:center;gap:22px;margin-bottom:20px;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--purple),var(--green))}
.avatar-lg{width:70px;height:70px;border-radius:50%;background:rgba(0,212,255,.12);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:28px;color:var(--accent);flex-shrink:0;box-shadow:0 0 20px rgba(0,212,255,.2)}
.profile-info{flex:1}
.profile-name{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--text)}
.profile-email{font-size:11px;color:var(--text3);font-family:'JetBrains Mono';margin-top:2px}
.profile-badges{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.plan-badge-pill{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:1px}
.plan-free{background:rgba(85,102,119,.2);color:var(--text3);border:1px solid var(--text3)}
.plan-starter{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid var(--accent)}
.plan-basic{background:rgba(0,255,136,.1);color:var(--green);border:1px solid var(--green)}
.plan-pro{background:rgba(155,109,255,.15);color:var(--purple);border:1px solid var(--purple)}
.plan-elite{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid var(--gold)}
.admin-pill{background:rgba(255,59,92,.12);color:var(--red);border:1px solid var(--red);font-family:'JetBrains Mono';font-size:9px;padding:3px 10px;border-radius:10px;letter-spacing:1px}
.profile-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.action-btn{padding:8px 16px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono';text-transform:uppercase;text-decoration:none;text-align:center;transition:all .2s}
.btn-store{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;border:none}
.btn-signout{background:transparent;border:1px solid rgba(255,59,92,.3);color:var(--red)}
.btn-signout:hover{background:rgba(255,59,92,.1)}
.btn-admin{background:transparent;border:1px solid rgba(255,59,92,.4);color:var(--red);text-decoration:none;display:block}
/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-family:'Bebas Neue';font-size:30px;line-height:1}
.stat-lbl{font-size:9px;color:var(--text3);font-family:'JetBrains Mono';letter-spacing:1px;text-transform:uppercase;margin-top:3px}
/* CREDITS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}
.credit-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,45,61,.6)}
.credit-row:last-child{border-bottom:none}
.credit-type{font-size:12px;color:var(--text2)}
.credit-num{font-family:'Bebas Neue';font-size:22px}
.credit-ai{color:var(--accent)}
.credit-parlay{color:var(--green)}
.credit-buy{display:block;margin-top:12px;text-align:center;padding:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:7px;color:var(--accent);font-size:11px;font-weight:700;text-decoration:none;font-family:'JetBrains Mono';transition:all .2s}
.credit-buy:hover{background:rgba(0,212,255,.15)}
/* REFERRAL */
.ref-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.ref-code-box{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin:10px 0}
.ref-code{font-family:'Bebas Neue';font-size:20px;color:var(--accent);letter-spacing:3px;flex:1}
.ref-copy{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);padding:5px 12px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono'}
.ref-progress{margin-top:10px}
.ref-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0}
.ref-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .6s}
.ref-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'JetBrains Mono'}
/* SLIPS */
.slip-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.slip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slip-title{font-size:12px;font-weight:600;color:var(--text)}
.slip-badge{font-size:8px;font-family:'JetBrains Mono';padding:2px 7px;border-radius:3px}
.s-pending{background:rgba(255,215,0,.1);border:1px solid var(--gold);color:var(--gold)}
.s-won{background:rgba(0,255,136,.1);border:1px solid var(--green);color:var(--green)}
.s-lost{background:rgba(255,59,92,.1);border:1px solid var(--red);color:var(--red)}
.slip-leg{font-size:10px;color:var(--text3);padding:3px 0;border-bottom:1px solid rgba(30,45,61,.5)}
.slip-leg:last-child{border:none}
.slip-meta{display:flex;gap:10px;margin-top:7px;font-size:9px;color:var(--text3);font-family:'JetBrains Mono'}
.empty-msg{text-align:center;padding:30px;color:var(--text3);font-size:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* AUTH MODAL */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.auth-overlay.open{display:flex}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;width:380px;max-width:95vw;padding:28px;position:relative}
.auth-close{position:absolute;top:13px;right:13px;color:var(--text3);cursor:pointer;font-size:17px}
.auth-logo{font-family:'Bebas Neue';font-size:22px;color:var(--accent);letter-spacing:3px;text-align:center;margin-bottom:4px}
.auth-title{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px}
.auth-input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:12px;font-family:'Space Grotesk';outline:none;margin-bottom:10px;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:7px;font-size:12px;font-weight:800;font-family:'Space Grotesk';cursor:pointer}
.auth-switch{text-align:center;margin-top:14px;font-size:11px;color:var(--text3)}
.auth-switch a{color:var(--accent);cursor:pointer}
.auth-error{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.3);color:var(--red);padding:8px;border-radius:6px;font-size:11px;margin-bottom:10px;display:none}
.auth-error.show{display:block}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}.profile-hero{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="logo">SLIP IQ</a>
  <a href="index.html" class="nav-link">← App</a>
  <a href="store.html" class="nav-link">Store</a>
  <div class="header-right" id="headerRight">
    <button class="btn-login" onclick="openAuth('login')">Sign In</button>
    <button class="btn-signup" onclick="openAuth('signup')">Start Free →</button>
  </div>
</div>

<div class="container" id="container">
  <div class="gate" id="gateScreen">
    <div class="gate-icon">🔒</div>
    <div class="gate-title">SIGN IN TO VIEW YOUR PROFILE</div>
    <div class="gate-text">Track your parlays, credits, referrals, and saved slips.<a href="login.html" class="nav-link">Store</a></div>
    <button class="gate-btn" onclick="openAuth('login')">Sign In / Sign Up</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="auth-overlay" id="authOverlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-card">
    <div class="auth-close" onclick="closeAuth()">✕</div>
    <div class="auth-logo">SLIP IQ</div>
    <div class="auth-title" id="authTitle">Sign in to your account</div>
    <div class="auth-error" id="authError"></div>
    <input type="email" class="auth-input" id="authEmail" placeholder="Email address">
    <input type="password" class="auth-input" id="authPassword" placeholder="Password">
    <button class="auth-btn" id="authBtn" onclick="submitAuth()">Sign In</button>
    <div class="auth-switch" id="authSwitch">No account? <a onclick="toggleAuthMode()">Sign up free</a></div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://gwigcknxdcdwsgnzysom.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3aWdja254ZGNkd3Nnbnp5c29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjE3NjgsImV4cCI6MjA4OTMzNzc2OH0.53IvL56zylYYCiLLzIqMighYO4--VWKTUhns5nxE-eg'
const ADMIN_EMAIL       = 'zioncmulangala@gmail.com'
const API               = ''

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let currentUser = null, userPlan = 'free', authMode = 'login'
let userCredits = { ai_analysis_credits:0, parlay_credits:0 }
let savedSlips = [], referralCode = null, referralUses = []

async function init() {
  const { data:{ session } } = await sb.auth.getSession()
  if (session) { await setUser(session.user); renderProfile() }
  else renderHeader()

  sb.auth.onAuthStateChange(async (ev, session) => {
    if (session) { await setUser(session.user); renderProfile() }
    else { currentUser=null; userPlan='free'; renderHeader(); showGate() }
  })
}

async function setUser(user) {
  currentUser = user
  const [subRes, credRes] = await Promise.all([
    sb.from('subscriptions').select('plan,status').eq('user_id',user.id).single().catch(()=>({data:null})),
    sb.from('user_credits').select('*').eq('user_id',user.id).single().catch(()=>({data:null}))
  ])
  userPlan = (subRes.data?.status==='active') ? (subRes.data?.plan||'free') : 'free'
  if (credRes.data) userCredits = credRes.data
}

function renderHeader() {
  const r = document.getElementById('headerRight')
  if (!r) return
  if (currentUser) {
    const init = (currentUser.user_metadata?.name||currentUser.email||'?')[0].toUpperCase()
    const isAdmin = currentUser.email === ADMIN_EMAIL
    r.innerHTML = `${isAdmin?'<a href="admin.html" class="nav-link" style="color:#ff3b5c">⚙ Admin</a>':''}
      <a href="store.html" class="nav-link">Store</a>
      <div class="plan-badge-pill plan-${userPlan}" style="display:inline-block">${userPlan.toUpperCase()}</div>
      <div class="avatar-lg" style="width:28px;height:28px;font-size:12px;border-width:2px;flex-shrink:0">${init}</div>`
  } else {
    r.innerHTML = `<button class="btn-login" onclick="openAuth('login')">Sign In</button><button class="btn-signup" onclick="openAuth('signup')">Start Free →</button>`
  }
}

function showGate() {
  document.getElementById('container').innerHTML = `<div class="gate"><div class="gate-icon">🔒</div><div class="gate-title">SIGN IN TO VIEW YOUR PROFILE</div><div class="gate-text">Track your parlays, credits, referrals, and saved slips.</div><button class="gate-btn" onclick="openAuth('login')">Sign In / Sign Up</button></div>`
}

async function renderProfile() {
  renderHeader()
  if (!currentUser) { showGate(); return }

  // Load all data in parallel
  const [slipsRes, refCodeRes, refUsesRes] = await Promise.all([
    sb.from('saved_slips').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(20),
    sb.from('referral_codes').select('*').eq('user_id',currentUser.id).single().catch(()=>({data:null})),
    sb.from('referral_uses').select('*').eq('referrer_user_id',currentUser.id).catch(()=>({data:[]}))
  ])

  savedSlips   = slipsRes.data   || []
  referralCode = refCodeRes.data || null
  referralUses = refUsesRes.data || []

  // Auto-generate user referral code if not exists
  if (!referralCode) {
    const nameBase = (currentUser.user_metadata?.name||currentUser.email.split('@')[0]).toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5)
    const suffix = Math.floor(100+Math.random()*900)
    const code = nameBase + suffix
    const { data } = await sb.from('referral_codes').insert({
      code, type:'user', user_id:currentUser.id,
      discount_pct:25, first_month_commission_pct:0, recurring_commission_pct:0,
      is_active:true, total_uses:0, created_at:new Date().toISOString()
    }).select().single().catch(()=>({data:null}))
    referralCode = data
  }

  // Compute stats
  const totalSlips  = savedSlips.length
  const wonSlips    = savedSlips.filter(s=>s.status==='won').length
  const winRate     = totalSlips > 0 ? Math.round(wonSlips/totalSlips*100) : 0
  const avgConf     = totalSlips > 0 ? Math.round(savedSlips.reduce((s,sl)=>s+(sl.confidence_score||0),0)/totalSlips) : 0
  const totalRefs   = referralUses.length
  const freeMonths  = referralUses.filter(r=>r.subscription_plan==='pro').length >= 3 ? Math.floor(referralUses.filter(r=>r.subscription_plan==='pro').length/3) : 0
  const refProgress = Math.min(totalRefs % 3 || totalRefs, 3)

  const isAdmin = currentUser.email === ADMIN_EMAIL
  const displayName = currentUser.user_metadata?.name || currentUser.email.split('@')[0]
  const initLetter = displayName[0].toUpperCase()

  document.getElementById('container').innerHTML = `
  <!-- HERO -->
  <div class="profile-hero">
    <div class="avatar-lg">${initLetter}</div>
    <div class="profile-info">
      <div class="profile-name">${displayName}</div>
      <div class="profile-email">${currentUser.email}</div>
      <div class="profile-badges">
        <span class="plan-badge-pill plan-${userPlan}">${userPlan.toUpperCase()} PLAN</span>
        ${isAdmin?'<span class="admin-pill">⚙ ADMIN</span>':''}
        ${freeMonths>0?`<span class="plan-badge-pill plan-pro">${freeMonths} FREE MONTH${freeMonths>1?'S':''} EARNED</span>`:''}
      </div>
    </div>
    <div class="profile-actions">
      <a href="store.html" class="action-btn btn-store">⬆ Upgrade Plan</a>
      ${isAdmin?'<a href="admin.html" class="action-btn btn-admin">⚙ Admin</a>':''}
      <button class="action-btn btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${totalSlips}</div><div class="stat-lbl">Slips Saved</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${winRate}%</div><div class="stat-lbl">Win Rate</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${avgConf}</div><div class="stat-lbl">Avg Confidence</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${totalRefs}</div><div class="stat-lbl">Referrals</div></div>
  </div>

  <!-- CREDITS + REFERRAL -->
  <div class="two-col">
    <div class="card">
      <div class="card-title">Your Credits</div>
      <div class="credit-row">
        <span class="credit-type">🤖 AI Analysis</span>
        <span class="credit-num credit-ai">${userCredits.ai_analysis_credits||0}</span>
      </div>
      <div class="credit-row">
        <span class="credit-type">⚡ Parlay Builder</span>
        <span class="credit-num credit-parlay">${userCredits.parlay_credits||0}</span>
      </div>
      <a href="store.html" class="credit-buy">+ Buy More Credits →</a>
    </div>
    <div class="card">
      <div class="card-title">Your Referral Code</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Share this code — your friends get <strong style="color:var(--green)">25% off</strong> month one. You get <strong style="color:var(--gold)">1 free month</strong> per 3 Pro referrals.</div>
      <div class="ref-code-box">
        <span class="ref-code">${referralCode?.code||'—'}</span>
        <button class="ref-copy" onclick="copyCode('${referralCode?.code||''}')">COPY</button>
      </div>
      <div class="ref-progress">
        <div class="ref-bar-label"><span>${refProgress}/3 Pro referrals to free month</span><span>${totalRefs} total</span></div>
        <div class="ref-bar-track"><div class="ref-bar-fill" style="width:${(refProgress/3)*100}%"></div></div>
        ${freeMonths>0?`<div style="text-align:center;font-size:10px;color:var(--gold);font-family:'JetBrains Mono';margin-top:4px">🏆 ${freeMonths} free month${freeMonths>1?'s':''} earned!</div>`:''}
      </div>
    </div>
  </div>

  <!-- SAVED SLIPS -->
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">Saved Slips (${totalSlips})</div>
    <div id="slipsList">
      ${totalSlips===0
        ? '<div class="empty-msg">No saved slips yet.<br>Build a parlay in the app and click "Save to Slip".</div>'
        : savedSlips.map(slip => {
            const legs = slip.legs||[]
            const sCls = slip.status==='won'?'s-won':slip.status==='lost'?'s-lost':'s-pending'
            const sLabel = slip.status==='won'?'WON ✓':slip.status==='lost'?'LOST ✗':'PENDING ⏳'
            return `<div class="slip-card">
              <div class="slip-header">
                <div class="slip-title">${legs.length}-Leg ${(slip.sport||'football').toUpperCase()} — ${new Date(slip.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
                <span class="slip-badge ${sCls}">${sLabel}</span>
              </div>
              ${legs.map(l=>`<div class="slip-leg">${l.matchName||'Match'} → <strong>${l.label}</strong> @ <strong style="color:var(--gold)">${l.odds}</strong></div>`).join('')}
              <div class="slip-meta">
                <span>Odds: <strong style="color:var(--gold)">${slip.combined_odds}x</strong></span>
                <span>Conf: <strong style="color:var(--accent)">${slip.confidence_score}/100</strong></span>
              </div>
            </div>`
          }).join('')}
    </div>
  </div>`
}

function copyCode(code) {
  if (!code) return
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.ref-copy')
    if (btn) { btn.textContent = 'COPIED!'; setTimeout(()=>btn.textContent='COPY',2000) }
  })
}

async function signOut() {
  await sb.auth.signOut()
  window.location.href = 'index.html'
}

// AUTH
let authMode = 'login'
function openAuth(mode) {
  authMode = mode
  document.getElementById('authOverlay').classList.add('open')
  document.getElementById('authTitle').textContent = mode==='login'?'Sign in to your account':'Create your free account'
  document.getElementById('authBtn').textContent   = mode==='login'?'Sign In':'Create Account'
  document.getElementById('authSwitch').innerHTML  = mode==='login'?"No account? <a onclick='toggleAuthMode()'>Sign up free</a>":"Have an account? <a onclick='toggleAuthMode()'>Sign in</a>"
  document.getElementById('authError').classList.remove('show')
}
function closeAuth() { document.getElementById('authOverlay').classList.remove('open') }
function toggleAuthMode() { openAuth(authMode==='login'?'signup':'login') }

async function submitAuth() {
  const email=document.getElementById('authEmail').value.trim()
  const password=document.getElementById('authPassword').value
  const errEl=document.getElementById('authError'), btn=document.getElementById('authBtn')
  if (!email||!password){errEl.textContent='Please fill in all fields.';errEl.classList.add('show');return}
  btn.disabled=true;btn.textContent='Loading...'
  try {
    const result = authMode==='login'
      ? await sb.auth.signInWithPassword({email,password})
      : await sb.auth.signUp({email,password})
    if (result.error){errEl.textContent=result.error.message;errEl.classList.add('show');return}
    if (authMode==='signup'&&!result.data.session){errEl.style.color='var(--green)';errEl.textContent='✅ Check your email!';errEl.classList.add('show');return}
    closeAuth()
  } finally {btn.disabled=false;btn.textContent=authMode==='login'?'Sign In':'Create Account'}
}

window.addEventListener('DOMContentLoaded', init)
</script>
