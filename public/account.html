<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip IQ — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8);--sidebar:224px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
.nav-rail{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100;overflow:hidden;transition:width .25s}
.nav-rail.col{width:52px}
.nav-logo{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px}
.nav-logo-text{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.nav-logo-sub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;white-space:nowrap}
.nav-toggle{position:absolute;top:14px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;z-index:2}
.nav-slbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;padding:10px 14px 3px;white-space:nowrap}
.nav-rail.col .nav-slbl,.nav-rail.col .nlbl,.nav-rail.col .nav-logo-text,.nav-rail.col .nav-logo-sub{display:none}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--text2);font-size:13px;font-weight:500;white-space:nowrap;text-decoration:none}
.ni:hover{background:rgba(0,200,248,.06);color:var(--text)}
.ni.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
.nav-rail.col .ni{padding:10px 14px;justify-content:center}
.ni-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.nav-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border)}
.upg-btn{background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1px;padding:8px;border-radius:7px;border:none;cursor:pointer;display:block;width:100%;text-align:center;text-decoration:none;white-space:nowrap}
.nav-rail.col .upg-btn{font-size:0;padding:9px 0}.nav-rail.col .upg-btn::before{content:"⭐";font-size:16px}

/* MAIN */
.main{margin-left:var(--sidebar);transition:margin-left .25s;display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;overflow:hidden}
.main.col{margin-left:52px}
.topbar{height:50px;background:var(--panel);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--text)}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2)}

/* LOCKED STATE */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;padding:24px}
.lock-icon{font-size:52px;margin-bottom:4px;opacity:.7}
.lock-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--text)}
.lock-sub{font-size:14px;color:var(--text2);max-width:340px;line-height:1.6}
.lock-btns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.btn-primary{background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:11px;font-weight:700;letter-spacing:1px;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-secondary{background:rgba(0,200,248,.08);border:1px solid rgba(0,200,248,.25);color:var(--accent);font-family:'JetBrains Mono';font-size:11px;font-weight:700;letter-spacing:1px;padding:12px 24px;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}

/* LOADING */
.loading-wrap{display:flex;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);font-family:'JetBrains Mono';font-size:11px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PROFILE CONTENT */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px}
@media(max-width:700px){.profile-grid{grid-template-columns:1fr}}

/* PROFILE HERO */
.profile-hero{background:linear-gradient(135deg,rgba(0,200,248,.08),rgba(0,229,200,.04));border:1px solid rgba(0,200,248,.2);border-radius:13px;padding:22px 24px;display:flex;align-items:center;gap:20px;margin-bottom:20px;max-width:900px}
.avatar{width:64px;height:64px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:28px;color:#000;flex-shrink:0}
.ph-name{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:3px}
.ph-email{font-family:'JetBrains Mono';font-size:10px;color:var(--text3);margin-bottom:8px}
.plan-badge{font-family:'JetBrains Mono';font-size:10px;padding:4px 12px;border-radius:20px;letter-spacing:1px;font-weight:700;display:inline-block}
.plan-free{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--green)}
.plan-basic{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.3);color:var(--accent)}
.plan-plus,.plan-starter{background:rgba(255,140,66,.1);border:1px solid rgba(255,140,66,.3);color:var(--orange)}
.plan-pro{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:var(--purple)}
.plan-elite{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--gold)}
.sign-out-btn{margin-left:auto;background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.25);color:var(--red);font-family:'JetBrains Mono';font-size:9px;padding:6px 14px;border-radius:5px;cursor:pointer;letter-spacing:1px;flex-shrink:0}
.sign-out-btn:hover{background:rgba(255,59,92,.15)}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border2);border-radius:11px;padding:18px 20px}
.card-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:12px;color:var(--text2)}
.stat-val{font-family:'JetBrains Mono';font-size:13px;color:var(--text);font-weight:600}
.credit-big{font-family:'Bebas Neue';font-size:48px;color:var(--gold);line-height:1;margin:8px 0 4px}
.credit-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px}
.credit-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:12px 0}
.credit-bar{height:100%;background:var(--grad);border-radius:3px;transition:width .6s ease}

/* REFERRAL */
.ref-code-box{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
.ref-code{font-family:'Bebas Neue';font-size:24px;letter-spacing:4px;color:var(--accent)}
.copy-btn{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.3);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;padding:5px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px}
.copy-btn:hover{background:rgba(0,200,248,.2)}
.ref-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.ref-stat{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px;text-align:center}
.ref-stat-val{font-family:'Bebas Neue';font-size:22px;color:var(--teal)}
.ref-stat-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:1px}

/* DANGER ZONE */
.danger-btn{background:rgba(255,59,92,.06);border:1px solid rgba(255,59,92,.2);color:var(--red);font-family:'JetBrains Mono';font-size:10px;padding:9px 16px;border-radius:6px;cursor:pointer;letter-spacing:1px;width:100%;margin-top:8px}
.danger-btn:hover{background:rgba(255,59,92,.12)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--green);color:var(--green);font-family:'JetBrains Mono';font-size:11px;padding:10px 18px;border-radius:8px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* UPGRADE NUDGE */
.upgrade-nudge{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(0,200,248,.04));border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;max-width:900px}
.un-text{font-size:13px;color:var(--text2);flex:1}
.un-title{font-weight:700;color:var(--text);margin-bottom:2px}
.un-btn{background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;padding:8px 18px;border-radius:6px;border:none;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>

<div class="nav-rail" id="navRail">
  <div class="nav-logo">
    <div><div class="nav-logo-text">SLIP IQ</div><div class="nav-logo-sub">BETTING INTELLIGENCE v13</div></div>
  </div>
  <button class="nav-toggle" onclick="toggleSB()">☰</button>
  <div class="nav-slbl">MAIN</div>
  <a class="ni" href="home.html"><span class="ni-icon">⚽</span><span class="nlbl">Matches</span></a>
  <a class="ni" href="leagues.html"><span class="ni-icon">🏆</span><span class="nlbl">Leagues</span></a>
  <a class="ni" href="home.html"><span class="ni-icon">📰</span><span class="nlbl">News</span></a>
  <a class="ni" href="home.html"><span class="ni-icon">🎯</span><span class="nlbl">My Parlays</span></a>
  <div class="nav-slbl">ACCOUNT</div>
  <a class="ni active" href="account.html"><span class="ni-icon">👤</span><span class="nlbl">Profile</span></a>
  <a class="ni" href="subscriptions.html"><span class="ni-icon">🛒</span><span class="nlbl">Plans & Credits</span></a>
  <a class="ni" href="info.html"><span class="ni-icon">ℹ️</span><span class="nlbl">How To Use</span></a>
  <a class="ni" href="index.html"><span class="ni-icon">🏡</span><span class="nlbl">Home Page</span></a>
  <div class="nav-bottom"><a href="subscriptions.html" class="upg-btn">⚡ UPGRADE</a></div>
</div>

<div class="main" id="mainShell">
  <div class="topbar">
    <div class="topbar-title">MY PROFILE</div>
    <div id="topbar-status" style="font-family:'JetBrains Mono';font-size:10px;color:var(--text3)"></div>
  </div>
  <div class="content" id="mainContent">
    <!-- Loading -->
    <div class="loading-wrap" id="loadingState">
      <div class="spinner"></div>Checking authentication...
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sbClient = null
let sbCol = false
let currentUser = null
let currentSub = null

function toggleSB(){
  sbCol=!sbCol
  document.getElementById("navRail").classList.toggle("col",sbCol)
  document.getElementById("mainShell").classList.toggle("col",sbCol)
}

function showToast(msg, color){
  const t=document.getElementById("toast")
  t.textContent=msg
  t.style.borderColor=color||"var(--green)"
  t.style.color=color||"var(--green)"
  t.classList.add("show")
  setTimeout(()=>t.classList.remove("show"),2800)
}

// ── INIT ─────────────────────────────────────────────────
window.addEventListener("load", () => {
  setTimeout(initApp, 80)
})

function initApp(){
  // Support both your NEXUS_CONFIG pattern and the server's window vars
  const cfg = window.NEXUS_CONFIG || {}
  const supabaseUrl = cfg.SUPABASE_URL || window.SUPABASE_URL || ""
  const supabaseKey = cfg.SUPABASE_ANON_KEY || window.SUPABASE_ANON_KEY || ""

  if(!supabaseUrl || !supabaseKey){
    // Try fetching from /config.js directly as a fallback
    showLocked("config_missing")
    return
  }

  const { createClient } = supabase
  sbClient = createClient(supabaseUrl, supabaseKey)

  // Check session
  sbClient.auth.getSession().then(({ data, error }) => {
    if(data?.session?.user){
      loadProfile(data.session.user)
    } else {
      showLocked()
    }
  }).catch(() => showLocked())

  // Listen for auth changes
  sbClient.auth.onAuthStateChange((event, session) => {
    if(event === "SIGNED_IN" && session?.user){
      loadProfile(session.user)
    } else if(event === "SIGNED_OUT"){
      currentUser = null
      currentSub = null
      showLocked()
    }
  })
}

// ── LOAD PROFILE ─────────────────────────────────────────
async function loadProfile(user){
  currentUser = user
  document.getElementById("loadingState").style.display = "flex"

  // Fetch subscription from Supabase
  let sub = null
  try {
    const { data, error } = await sbClient
      .from("subscriptions")
      .select("*")
      .eq("user_id", user.id)
      .maybeSingle()
    if(!error && data) sub = data
    else if(error) {
      // Try by email as fallback
      const { data: d2 } = await sbClient
        .from("subscriptions")
        .select("*")
        .eq("email", user.email)
        .maybeSingle()
      if(d2) sub = d2
    }
  } catch(e){ console.log("Sub fetch:", e.message) }

  currentSub = sub
  renderProfile(user, sub)
}

// ── RENDER PROFILE ────────────────────────────────────────
function renderProfile(user, sub){
  const name = user.user_metadata?.full_name || user.email?.split("@")[0] || "User"
  const email = user.email || ""
  const plan = sub?.plan || "free"
  const status = sub?.status || "active"
  const avatarLetter = name.charAt(0).toUpperCase()

  // Credits: map plan to max (matching server PLAN_CREDITS)
  const PLAN_CREDITS = { free:25, starter:55, basic:55, plus:115, pro:265, elite:900 }
  const maxCredits = PLAN_CREDITS[plan] || 25
  // Referral code: generate from user id
  const refCode = "SLIP" + user.id.slice(0,6).toUpperCase()
  const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "—"
  const renewDate = sub?.current_period_end ? new Date(sub.current_period_end).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}) : "—"

  const planClass = `plan-${plan}`
  const isFree = plan === "free"
  const isActive = status === "active"
  const creditPct = Math.round((maxCredits / Math.max(maxCredits,1)) * 100)

  const content = document.getElementById("mainContent")
  content.innerHTML = `
  <!-- HERO -->
  <div class="profile-hero">
    <div class="avatar">${avatarLetter}</div>
    <div style="flex:1">
      <div class="ph-name">${escH(name)}</div>
      <div class="ph-email">${escH(email)}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="plan-badge ${planClass}">${plan.toUpperCase()} PLAN</span>
        <span style="font-family:'JetBrains Mono';font-size:9px;padding:3px 8px;border-radius:4px;background:${isActive?"rgba(0,255,136,.1)":"rgba(255,59,92,.1)"};border:1px solid ${isActive?"rgba(0,255,136,.3)":"rgba(255,59,92,.3)"};color:${isActive?"var(--green)":"var(--red)"}">${status.toUpperCase()}</span>
      </div>
    </div>
    <button class="sign-out-btn" onclick="signOut()">SIGN OUT</button>
  </div>

  ${isFree ? `<div class="upgrade-nudge">
    <div class="un-text">
      <div class="un-title">Unlock the full platform</div>
      Upgrade to Plus+ for live league standings, team profiles, formation viewer, AI scout reports, and auto parlay builder.
    </div>
    <a href="subscriptions.html" class="un-btn">⚡ UPGRADE NOW</a>
  </div>` : ""}

  <div class="profile-grid">
    <!-- CREDITS -->
    <div class="card">
      <div class="card-title">CREDITS</div>
      <div class="credit-big" id="creditDisplay">—</div>
      <div class="credit-lbl">REMAINING THIS MONTH</div>
      <div class="credit-bar-wrap"><div class="credit-bar" id="creditBar" style="width:0%"></div></div>
      <div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-size:9px;color:var(--text3)">
        <span>0</span><span>${maxCredits} MAX</span>
      </div>
      <div style="margin-top:12px">
        <a href="subscriptions.html" style="font-family:'JetBrains Mono';font-size:9px;color:var(--accent);text-decoration:none;border:1px solid rgba(0,200,248,.3);padding:5px 12px;border-radius:4px;display:inline-block">+ BUY MORE CREDITS</a>
      </div>
    </div>

    <!-- SUBSCRIPTION DETAILS -->
    <div class="card">
      <div class="card-title">SUBSCRIPTION</div>
      <div class="stat-row"><span class="stat-lbl">Plan</span><span class="stat-val" style="text-transform:uppercase">${plan}</span></div>
      <div class="stat-row"><span class="stat-lbl">Status</span><span class="stat-val" style="color:${isActive?"var(--green)":"var(--red)"}">${status}</span></div>
      <div class="stat-row"><span class="stat-lbl">Joined</span><span class="stat-val">${joinDate}</span></div>
      <div class="stat-row"><span class="stat-lbl">Renews</span><span class="stat-val">${renewDate}</span></div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <a href="subscriptions.html" style="font-family:'JetBrains Mono';font-size:9px;color:var(--accent);text-decoration:none;border:1px solid rgba(0,200,248,.3);padding:5px 12px;border-radius:4px">MANAGE PLAN</a>
        ${sub?.stripe_customer_id ? `<a href="subscriptions.html" style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:4px">BILLING PORTAL</a>` : ""}
      </div>
    </div>

    <!-- REFERRAL -->
    <div class="card">
      <div class="card-title">REFERRAL CODE</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">Share your code — you both get a free month when they subscribe.</div>
      <div class="ref-code-box">
        <span class="ref-code" id="refCodeDisplay">${refCode}</span>
        <button class="copy-btn" onclick="copyRef()">COPY</button>
      </div>
      <div class="ref-stats">
        <div class="ref-stat"><div class="ref-stat-val" id="refCount">—</div><div class="ref-stat-lbl">REFERRALS</div></div>
        <div class="ref-stat"><div class="ref-stat-val" id="refBonus">—</div><div class="ref-stat-lbl">FREE MONTHS</div></div>
      </div>
    </div>

    <!-- ACCOUNT DETAILS -->
    <div class="card">
      <div class="card-title">ACCOUNT</div>
      <div class="stat-row"><span class="stat-lbl">User ID</span><span class="stat-val" style="font-size:10px;color:var(--text3)">${user.id.slice(0,16)}…</span></div>
      <div class="stat-row"><span class="stat-lbl">Auth provider</span><span class="stat-val">${user.app_metadata?.provider || "email"}</span></div>
      <div class="stat-row"><span class="stat-lbl">Email confirmed</span><span class="stat-val" style="color:${user.email_confirmed_at?"var(--green)":"var(--orange)"}">${user.email_confirmed_at?"Yes":"Pending"}</span></div>
      <div class="stat-row"><span class="stat-lbl">Last sign in</span><span class="stat-val" style="font-size:11px">${user.last_sign_in_at ? new Date(user.last_sign_in_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}</span></div>
      <div style="margin-top:10px">
        <button class="danger-btn" onclick="confirmDeleteAccount()">🗑 DELETE ACCOUNT</button>
      </div>
    </div>
  </div>`

  // Now fetch live credits from our API
  fetchLiveCredits(user.id, maxCredits)
  // Fetch referral stats
  fetchReferralStats(user.id)
}

// ── FETCH LIVE CREDITS FROM SERVER ───────────────────────
async function fetchLiveCredits(userId, planMax){
  try {
    const res = await fetch(`/user/${userId}`)
    if(!res.ok) throw new Error("no data")
    const data = await res.json()
    const used = data.credits_used || 0
    const total = data.credits_total || planMax
    const remaining = Math.max(0, total - used)
    const pct = Math.round((remaining / Math.max(total,1)) * 100)
    const el = document.getElementById("creditDisplay")
    const bar = document.getElementById("creditBar")
    if(el) el.textContent = remaining
    if(bar) {
      bar.style.width = pct + "%"
      bar.style.background = pct > 50 ? "var(--grad)" : pct > 20 ? "linear-gradient(135deg,var(--orange),var(--gold))" : "linear-gradient(135deg,var(--red),var(--orange))"
    }
  } catch(e){
    // Server not available — show plan max as remaining
    const el = document.getElementById("creditDisplay")
    const bar = document.getElementById("creditBar")
    if(el) el.textContent = planMax
    if(bar) bar.style.width = "100%"
  }
}

// ── FETCH REFERRAL STATS ──────────────────────────────────
async function fetchReferralStats(userId){
  try {
    const refCode = "SLIP" + userId.slice(0,6).toUpperCase()
    const { data } = await sbClient
      .from("subscriptions")
      .select("id", { count:"exact" })
      .eq("referral_code_used", refCode)
    const count = data?.length || 0
    const el1 = document.getElementById("refCount")
    const el2 = document.getElementById("refBonus")
    if(el1) el1.textContent = count
    if(el2) el2.textContent = Math.floor(count / 3) // 1 free month per 3 referrals
  } catch(e){
    const el1 = document.getElementById("refCount")
    const el2 = document.getElementById("refBonus")
    if(el1) el1.textContent = 0
    if(el2) el2.textContent = 0
  }
}

// ── LOCKED SCREEN ─────────────────────────────────────────
function showLocked(reason){
  const content = document.getElementById("mainContent")
  const loginUrl = "login.html"
  const signupUrl = "login.html?tab=signup"

  if(reason === "config_missing"){
    content.innerHTML = `<div class="lock-screen">
      <div class="lock-icon">⚙️</div>
      <div class="lock-title">CONFIG NOT LOADED</div>
      <div class="lock-sub">The Supabase config could not be loaded from /js/config.js. Check your server is running and the config file is accessible.</div>
    </div>`
    return
  }

  content.innerHTML = `<div class="lock-screen">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">SIGN IN TO VIEW YOUR PROFILE</div>
    <div class="lock-sub">Track your parlays, credits, referrals, and subscription. Sign in or create a free account to get started.</div>
    <div class="lock-btns">
      <a href="${loginUrl}" class="btn-primary">→ SIGN IN</a>
      <a href="${signupUrl}" class="btn-secondary">CREATE FREE ACCOUNT</a>
    </div>
    <div style="margin-top:16px;font-family:'JetBrains Mono';font-size:9px;color:var(--text3)">Free plan includes 25 credits/month and match predictions</div>
  </div>`
}

// ── SIGN OUT ──────────────────────────────────────────────
async function signOut(){
  if(!sbClient) return
  try {
    await sbClient.auth.signOut()
    showToast("Signed out successfully")
  } catch(e){
    showToast("Sign out failed", "var(--red)")
  }
}

// ── COPY REFERRAL CODE ────────────────────────────────────
function copyRef(){
  const code = document.getElementById("refCodeDisplay")?.textContent || ""
  if(!code) return
  navigator.clipboard.writeText(code).then(()=>showToast("Referral code copied! ✓")).catch(()=>{
    // Fallback
    const ta = document.createElement("textarea")
    ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta)
    showToast("Referral code copied! ✓")
  })
}

// ── DELETE ACCOUNT ────────────────────────────────────────
async function confirmDeleteAccount(){
  if(!confirm("Are you sure you want to delete your account? This cannot be undone.")) return
  if(!confirm("Last chance — all your data will be permanently deleted.")) return
  try {
    await sbClient.auth.signOut()
    showToast("Account deletion requested. Contact support to complete.", "var(--orange)")
  } catch(e){ showToast("Error — contact support", "var(--red)") }
}

function escH(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") }
