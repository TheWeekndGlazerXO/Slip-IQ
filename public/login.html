<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip IQ — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="/js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.card{background:var(--panel);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;width:100%;max-width:420px;position:relative;z-index:1}
.logo{font-family:'Bebas Neue';font-size:32px;letter-spacing:4px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.logo-sub{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px;text-align:center;margin-bottom:28px}
.tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px;cursor:pointer;background:transparent;border:none;color:var(--text3);transition:all .2s}
.tab.active{background:rgba(0,200,248,.1);color:var(--accent)}
.field{margin-bottom:14px}
.field label{display:block;font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:var(--text3);margin-bottom:5px}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:11px 14px;color:var(--text);font-family:'DM Sans';font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.tcs-wrap{display:flex;align-items:flex-start;gap:10px;margin:14px 0;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:7px}
.tcs-wrap input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer}
.tcs-text{font-size:11px;color:var(--text2);line-height:1.5}
.tcs-text a{color:var(--accent);text-decoration:none}
.btn-main{width:100%;background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:12px;font-weight:700;letter-spacing:1px;padding:13px;border-radius:8px;border:none;cursor:pointer;margin-top:6px;transition:opacity .2s}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-google{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text3);font-family:'DM Sans';font-size:13px;font-weight:500;padding:12px;border-radius:8px;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;opacity:.55}
.btn-google svg{width:18px;height:18px;flex-shrink:0;opacity:.5}
.soon-badge{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;background:rgba(0,200,248,.12);color:var(--accent);border:1px solid rgba(0,200,248,.2);padding:2px 7px;border-radius:4px;margin-left:4px}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.err-msg{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.25);color:var(--red);font-family:'JetBrains Mono';font-size:10px;padding:10px 12px;border-radius:6px;margin-bottom:14px;display:none}
.err-msg.show{display:block}
.ok-msg{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:var(--green);font-family:'JetBrains Mono';font-size:10px;padding:10px 12px;border-radius:6px;margin-bottom:14px;display:none}
.ok-msg.show{display:block}
.rate-warn{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);text-align:center;margin-top:10px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SLIP IQ</div>
  <div class="logo-sub">BETTING INTELLIGENCE v14</div>

  <button class="btn-google" disabled title="Coming soon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
    <span class="soon-badge">COMING SOON</span>
  </button>

  <div class="divider">OR</div>

  <div class="tabs">
    <button class="tab active" id="tabSignin" onclick="switchTab('signin')">SIGN IN</button>
    <button class="tab" id="tabSignup" onclick="switchTab('signup')">CREATE ACCOUNT</button>
  </div>

  <div id="errMsg" class="err-msg"></div>
  <div id="okMsg" class="ok-msg"></div>

  <!-- SIGN IN FORM -->
  <div id="formSignin">
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="siEmail" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-main" id="btnSignin" onclick="doSignIn()">SIGN IN</button>
    <div class="rate-warn" id="rateWarn"></div>
    <div style="text-align:center;margin-top:14px">
      <span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="showForgot()">Forgot password?</span>
    </div>
  </div>

  <!-- SIGN UP FORM -->
  <div id="formSignup" style="display:none">
    <div class="field">
      <label>FULL NAME</label>
      <input type="text" id="suName" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="suEmail" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD (min 8 chars)</label>
      <input type="password" id="suPass" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="tcs-wrap">
      <input type="checkbox" id="tcsCheck">
      <div class="tcs-text">
        I agree to the <a href="terms.html" target="_blank">Terms &amp; Conditions</a> and
        <a href="privacy.html" target="_blank">Privacy Policy</a>. I confirm I am 18+ years old
        and understand this service is for informational purposes only — not financial advice.
      </div>
    </div>
    <button class="btn-main" id="btnSignup" onclick="doSignUp()">CREATE ACCOUNT</button>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="formForgot" style="display:none">
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="fpEmail" placeholder="you@email.com">
    </div>
    <button class="btn-main" onclick="doForgot()">SEND RESET EMAIL</button>
    <div style="text-align:center;margin-top:12px">
      <span style="font-size:12px;color:var(--text3);cursor:pointer" onclick="showSignin()">← Back to sign in</span>
    </div>
  </div>
</div>

<script>
let sbClient = null

const RATE_LIMIT = { attempts: 0, lockedUntil: 0 }
const MAX_ATTEMPTS = 25
const LOCKOUT_MS = 3 * 60 * 1000

window.addEventListener('load', () => {
  const cfg = window.NEXUS_CONFIG || {}
  const url = cfg.SUPABASE_URL || window.SUPABASE_URL || ''
  const key = cfg.SUPABASE_ANON_KEY || window.SUPABASE_ANON_KEY || ''
  if (!url || !key) { showErr('Config not loaded — check /js/config.js'); return }
  const { createClient } = supabase
  sbClient = createClient(url, key)

  sbClient.auth.getSession().then(({ data }) => {
    if (data?.session?.user) {
      sessionStorage.setItem('_slipiq_auth_ok', '1')
      redirectHome()
    } else {
      sessionStorage.removeItem('_slipiq_auth_ok')
    }
  })

  sbClient.auth.onAuthStateChange((event, session) => {
    if ((event === 'SIGNED_IN' || event === 'USER_UPDATED') && session?.user) {
      ensureUserRow(session.user).then(() => redirectHome())
    }
  })

  const tab = new URLSearchParams(location.search).get('tab')
  if (tab === 'signup') switchTab('signup')
})

function switchTab(tab) {
  document.getElementById('formSignin').style.display = tab === 'signin' ? '' : 'none'
  document.getElementById('formSignup').style.display = tab === 'signup' ? '' : 'none'
  document.getElementById('formForgot').style.display = 'none'
  document.getElementById('tabSignin').classList.toggle('active', tab === 'signin')
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup')
  clearMsgs()
}

function showForgot() {
  document.getElementById('formSignin').style.display = 'none'
  document.getElementById('formSignup').style.display = 'none'
  document.getElementById('formForgot').style.display = ''
  clearMsgs()
}

function showSignin() { switchTab('signin') }

function showErr(msg) {
  const el = document.getElementById('errMsg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('okMsg').classList.remove('show')
}
function showOk(msg) {
  const el = document.getElementById('okMsg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('errMsg').classList.remove('show')
}
function clearMsgs() {
  document.getElementById('errMsg').classList.remove('show')
  document.getElementById('okMsg').classList.remove('show')
}

function isRateLimited() {
  if (Date.now() < RATE_LIMIT.lockedUntil) {
    const mins = Math.ceil((RATE_LIMIT.lockedUntil - Date.now()) / 60000)
    showErr(`Too many attempts. Try again in ${mins} minute${mins > 1 ? 's' : ''}.`)
    return true
  }
  return false
}

function recordAttempt(success) {
  if (success) { RATE_LIMIT.attempts = 0; return }
  RATE_LIMIT.attempts++
  if (RATE_LIMIT.attempts >= MAX_ATTEMPTS) {
    RATE_LIMIT.lockedUntil = Date.now() + LOCKOUT_MS
    document.getElementById('rateWarn').textContent = `Account locked for 15 minutes after ${MAX_ATTEMPTS} failed attempts.`
  }
}

async function doSignIn() {
  if (!sbClient || isRateLimited()) return
  clearMsgs()
  const email = document.getElementById('siEmail').value.trim()
  const pass  = document.getElementById('siPass').value
  if (!email || !pass) { showErr('Please fill in all fields'); return }

  const btn = document.getElementById('btnSignin')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> SIGNING IN...'

  try {
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: pass })
    if (error) {
      recordAttempt(false)
      showErr(error.message === 'Invalid login credentials'
        ? 'Invalid email or password.' : error.message)
    } else {
      recordAttempt(true)
      await ensureUserRow(data.user)
      redirectHome()
    }
  } catch(e) { showErr('Sign in failed — please try again') }
  finally {
    btn.disabled = false; btn.textContent = 'SIGN IN'
  }
}

async function doSignUp() {
  if (!sbClient) return
  clearMsgs()
  const name  = document.getElementById('suName').value.trim()
  const email = document.getElementById('suEmail').value.trim()
  const pass  = document.getElementById('suPass').value
  const tcs   = document.getElementById('tcsCheck').checked

  if (!name || !email || !pass) { showErr('Please fill in all fields'); return }
  if (!tcs) { showErr('You must agree to the Terms & Conditions to create an account.'); return }
  if (pass.length < 8) { showErr('Password must be at least 8 characters.'); return }

  const btn = document.getElementById('btnSignup')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> CREATING ACCOUNT...'

  try {
    const { data, error } = await sbClient.auth.signUp({
      email,
      password: pass,
      options: { data: { full_name: name } }
    })
    if (error) {
      showErr(error.message)
    } else if (data.user && !data.session) {
      showOk('✓ Account created! Check your email to confirm your account, then sign in.')
      switchTab('signin')
    } else if (data.user && data.session) {
      await ensureUserRow(data.user, name)
      redirectHome()
    }
  } catch(e) { showErr('Sign up failed — please try again') }
  finally {
    btn.disabled = false; btn.textContent = 'CREATE ACCOUNT'
  }
}

async function doForgot() {
  if (!sbClient) return
  clearMsgs()
  const email = document.getElementById('fpEmail').value.trim()
  if (!email) { showErr('Please enter your email'); return }
  const { error } = await sbClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  })
  if (error) showErr(error.message)
  else showOk('✓ Password reset email sent! Check your inbox.')
}

async function ensureUserRow(user, name) {
  try {
    await fetch('/user/ensure', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: user.id,
        email: user.email,
        full_name: name || user.user_metadata?.full_name || ''
      })
    })
  } catch(e) {}
}

function redirectHome() {
  window.location.href = window.location.hostname === 'localhost'
    ? 'home.html'
    : 'https://slipiq.net/home.html'
}
</script>
</body>
</html>
