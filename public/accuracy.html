<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip IQ — Accuracy Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8);--sidebar-w:224px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .nav-rail{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100;overflow:hidden}
    .nav-logo{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--border);min-height:54px}
    .nav-logo-icon{font-size:20px}
    .nav-logo-text{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-logo-sub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px}
    .nav-section-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;padding:10px 14px 3px;text-transform:uppercase}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;text-decoration:none;color:var(--text2);transition:all .15s}
    .nav-item:hover{background:rgba(0,200,248,.06);color:var(--text)}
    .nav-item.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
    .nav-icon{font-size:15px;width:20px;text-align:center}
    .nav-label{font-size:13px;font-weight:500}
    .nav-bottom{margin-top:auto;padding:10px 0;border-top:1px solid var(--border)}
    .upgrade-btn{margin:6px 10px;background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1px;padding:8px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;text-align:center;display:block;text-decoration:none}
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    .topbar{background:var(--panel);border-bottom:1px solid var(--border2);height:46px;display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
    .topbar-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .btn-sm{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.25);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:5px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .btn-sm:hover{background:rgba(0,200,248,.2)}
    .content{padding:18px;display:flex;flex-direction:column;gap:16px}
    .hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
    .hero-card{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
    .hero-card:hover{border-color:rgba(0,200,248,.4);transform:translateY(-2px)}
    .hero-card.highlight{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.04)}
    .hero-val{font-family:'Bebas Neue';font-size:36px;line-height:1}
    .hero-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:3px}
    .hero-sub{font-size:10px;color:var(--text3);margin-top:2px}
    .section{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:16px}
    .section-title{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .sport-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-family:'JetBrains Mono';font-size:9px;cursor:pointer;border:1px solid var(--border2);color:var(--text3);transition:all .2s;margin:2px}
    .sport-chip:hover,.sport-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,248,.08)}
    .sport-chip .dot{width:7px;height:7px;border-radius:50%}
    .parlay-history-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid rgba(14,32,64,.5);cursor:pointer;transition:background .15s;border-radius:5px}
    .parlay-history-row:hover{background:rgba(0,200,248,.04)}
    .parlay-history-row:last-child{border-bottom:none}
    .status-pill{font-family:'JetBrains Mono';font-size:8px;padding:2px 7px;border-radius:10px;letter-spacing:1px}
    .s-won{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
    .s-lost{background:rgba(255,59,92,.15);color:var(--red);border:1px solid rgba(255,59,92,.3)}
    .s-pending{background:rgba(0,200,248,.1);color:var(--accent);border:1px solid rgba(0,200,248,.25)}
    .chart-wrap{position:relative;height:220px}
    .chart-wrap canvas{max-height:220px}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .filter-sel{background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:'JetBrains Mono';font-size:9px;padding:4px 7px;outline:none;cursor:pointer}
    .filter-sel:focus{border-color:var(--accent)}
    .spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-msg{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--text3);padding:40px 20px;line-height:2}
    .leg-result-row{font-size:10px;color:var(--text2);padding:3px 0;display:flex;gap:6px;align-items:center}
    .lr-hit{color:var(--green)}.lr-miss{color:var(--red)}.lr-pending{color:var(--text3)}
    .calibration-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .cal-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);width:70px;flex-shrink:0}
    .cal-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
    .cal-bar-actual{height:100%;border-radius:3px;background:var(--green);transition:width .5s}
    .cal-bar-pred{position:absolute;top:0;height:100%;border-right:2px solid var(--gold)}
    .cal-num{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);width:60px;text-align:right;flex-shrink:0}
    .drilldown-panel{background:rgba(0,200,248,.03);border:1px solid rgba(0,200,248,.15);border-radius:8px;padding:14px;margin-top:12px;display:none}
    .drilldown-panel.open{display:block}
    .metric-mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-top:10px}
    .metric-mini{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
    .metric-mini-val{font-family:'Bebas Neue';font-size:20px;color:var(--accent)}
    .metric-mini-lbl{font-family:'JetBrains Mono';font-size:7px;color:var(--text3);letter-spacing:1px}
    .alert-box{background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);border-radius:7px;padding:10px 14px;font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6}
  </style>
</head>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">📊 PREDICTION ACCURACY</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <span id="lastUpdated" style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3)"></span>
      <button class="btn-sm" onclick="loadData()">⟳ REFRESH</button>
      <a href="home.html" class="btn-sm">← MATCHES</a>
    </div>
  </div>

  <div class="content" id="mainContent">
    <div style="text-align:center;padding:60px 20px">
      <div class="spinner"></div>
      <div style="font-family:'JetBrains Mono';font-size:10px;color:var(--text3);margin-top:12px">LOADING YOUR PARLAY DATA...</div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
var USER_ID = null;
var _sb = null;
var allParlays = [];
var filteredSport = 'all';
var filteredStatus = 'all';

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // Get user ID
  try {
    if (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      var { data: sd } = await _sb.auth.getSession();
      if (sd && sd.session && sd.session.user) USER_ID = sd.session.user.id;
    }
  } catch(e) {}

  if (!USER_ID) {
    for (var k in localStorage) {
      if (k.indexOf('sb-') === 0 && k.indexOf('-auth-token') !== -1) {
        try {
          var p = JSON.parse(localStorage.getItem(k));
          var uid = (p && p.user && p.user.id) || (p && p.session && p.session.user && p.session.user.id);
          if (uid) { USER_ID = uid; break; }
        } catch(e2) {}
      }
    }
  }

  if (!USER_ID) {
    var stored = localStorage.getItem('slipiq_uid');
    if (stored && !stored.startsWith('user_')) USER_ID = stored;
  }

  await loadData();
}

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:60px 20px"><div class="spinner"></div></div>'

  var parlays = []

  // Load from server parlays endpoint
  if (USER_ID) {
    try {
      var r = await fetch('/parlays/' + USER_ID)
      if (r.ok) parlays = await r.json()
    } catch(e) {}
  }

  // Merge localStorage
  var local = []
  try { local = JSON.parse(localStorage.getItem('slipiq_parlays') || '[]') } catch(e) {}
  var serverIds = new Set(parlays.map(function(p){ return String(p.id) }))
  local.forEach(function(lp){ if (!serverIds.has(String(lp.id))) parlays.push(lp) })

  // Also pull server accuracy stats (prediction log)
  var serverStats = null
  try {
    var sr = await fetch('/accuracy/stats')
    if (sr.ok) serverStats = await sr.json()
  } catch(e) {}

  allParlays = parlays.map(function(p) {
    var legs = p.legs
    if (typeof legs === 'string') { try { legs = JSON.parse(legs) } catch(e) { legs = [] } }
    var lr = p.leg_results
    if (typeof lr === 'string') { try { lr = JSON.parse(lr) } catch(e) { lr = null } }
    return Object.assign({}, p, { legs: legs||[], leg_results: lr })
  }).sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at) })

  window._serverStats = serverStats
  document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
  render()
}
// ─── COMPUTE METRICS ─────────────────────────────────────────────────────────
function computeMetrics(parlays) {
  var settled = parlays.filter(function(p){ return p.status === 'won' || p.status === 'lost'; });
  var won = parlays.filter(function(p){ return p.status === 'won'; });
  var lost = parlays.filter(function(p){ return p.status === 'lost'; });
  var pending = parlays.filter(function(p){ return !p.status || p.status === 'pending'; });

  var winRate = settled.length > 0 ? (won.length / settled.length * 100) : null;

  // Per-leg hit rate
  var totalLegs = 0, hitLegs = 0;
  parlays.forEach(function(p) {
    if (p.hits_count !== null && p.hits_count !== undefined && p.leg_count) {
      totalLegs += parseInt(p.leg_count) || p.legs.length;
      hitLegs += parseInt(p.hits_count) || 0;
    } else if (p.leg_results && Array.isArray(p.leg_results)) {
      totalLegs += p.leg_results.length;
      hitLegs += p.leg_results.filter(function(lr){ return lr.result === 'won' || lr.hit === true; }).length;
    }
  });
  var legHitRate = totalLegs > 0 ? (hitLegs / totalLegs * 100) : null;

  // Average confidence of winning vs losing
  var wonConf = won.length > 0 ? won.reduce(function(s,p){ return s+(p.confidence_score||0); },0)/won.length : null;
  var lostConf = lost.length > 0 ? lost.reduce(function(s,p){ return s+(p.confidence_score||0); },0)/lost.length : null;

  // ROI (assume £10 per parlay stake)
  var stake = 10;
  var totalStaked = settled.length * stake;
  var totalReturned = won.reduce(function(s,p){ return s + stake * (parseFloat(p.combined_odds)||1); }, 0);
  var roi = totalStaked > 0 ? ((totalReturned - totalStaked) / totalStaked * 100) : null;

  // Avg odds
  var avgOdds = parlays.length > 0 ? parlays.reduce(function(s,p){ return s+parseFloat(p.combined_odds||1); },0)/parlays.length : null;
  var avgConf = parlays.length > 0 ? parlays.reduce(function(s,p){ return s+(p.confidence_score||0); },0)/parlays.length : null;

  // Streak
  var currentStreak = 0, bestStreak = 0, tempStreak = 0;
  var streakType = null;
  settled.slice().reverse().forEach(function(p, i) {
    var w = p.status === 'won';
    if (i === 0) { streakType = w; tempStreak = 1; }
    else if (w === streakType) { tempStreak++; }
    else { bestStreak = Math.max(bestStreak, tempStreak); tempStreak = 1; streakType = w; }
  });
  bestStreak = Math.max(bestStreak, tempStreak);
  if (settled.length > 0) {
    var last = settled[0].status;
    currentStreak = 0;
    for (var i = 0; i < settled.length; i++) {
      if (settled[i].status === last) currentStreak++;
      else break;
    }
  }

  // Per-sport breakdown
  var bySport = {};
  parlays.forEach(function(p) {
    var legs = p.legs || [];
    var sports = [...new Set(legs.map(function(l){ return l.sport || 'football'; }))];
    sports.forEach(function(sport) {
      if (!bySport[sport]) bySport[sport] = { total:0, won:0, lost:0, pending:0 };
      bySport[sport].total++;
      if (p.status === 'won') bySport[sport].won++;
      else if (p.status === 'lost') bySport[sport].lost++;
      else bySport[sport].pending++;
    });
  });

  // Per-market breakdown
  var byMarket = {};
  parlays.forEach(function(p) {
    var legs = p.legs || [];
    var lr = p.leg_results || null;
    legs.forEach(function(leg, i) {
      var mkt = getMarketType(leg.pick || '');
      if (!byMarket[mkt]) byMarket[mkt] = { total:0, hits:0 };
      byMarket[mkt].total++;
      if (lr && lr[i]) {
        var hit = lr[i].result === 'won' || lr[i].hit === true;
        if (hit) byMarket[mkt].hits++;
      }
    });
  });

  // Monthly accuracy
  var byMonth = {};
  settled.forEach(function(p) {
    var d = new Date(p.created_at || p.settled_at || Date.now());
    var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMonth[key]) byMonth[key] = { won:0, total:0 };
    byMonth[key].total++;
    if (p.status === 'won') byMonth[key].won++;
  });

  // Confidence calibration buckets
  var confBuckets = {
    '10-30': {wins:0,total:0}, '31-50': {wins:0,total:0},
    '51-65': {wins:0,total:0}, '66-80': {wins:0,total:0}, '81+': {wins:0,total:0}
  };
  settled.forEach(function(p) {
    var c = p.confidence_score || 0;
    var key = c <= 30 ? '10-30' : c <= 50 ? '31-50' : c <= 65 ? '51-65' : c <= 80 ? '66-80' : '81+';
    confBuckets[key].total++;
    if (p.status === 'won') confBuckets[key].wins++;
  });

  return { total:parlays.length, settled:settled.length, won:won.length, lost:lost.length, pending:pending.length, winRate, legHitRate, roi, avgOdds, avgConf, wonConf, lostConf, currentStreak, bestStreak, streakType: settled.length > 0 ? settled[0].status : null, bySport, byMarket, byMonth, confBuckets, totalLegs, hitLegs };
}

function getMarketType(pick) {
  if (!pick) return 'other';
  if (pick === 'home' || pick === 'away' || pick === 'draw') return 'match result';
  if (pick.includes('btts')) return 'btts';
  if (pick.includes('over')) return 'over/under';
  if (pick.includes('under')) return 'over/under';
  if (pick.includes('dc')) return 'double chance';
  return 'other';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  var toUse = allParlays.filter(function(p) {
    if (filteredStatus !== 'all' && p.status !== filteredStatus) return false;
    if (filteredSport !== 'all') {
      var legs = p.legs || [];
      var hasSport = legs.some(function(l){ return (l.sport||'football') === filteredSport; });
      if (!hasSport) return false;
    }
    return true;
  });

  var m = computeMetrics(toUse);

  if (!allParlays.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-msg">🎯<br><br>No saved parlays yet.<br>Build and save parlays in the main app to track your accuracy here.<br><br><a href="home.html" style="color:var(--accent);font-family:\'JetBrains Mono\';font-size:10px">→ GO TO MATCHES</a></div>';
    return;
  }

  var html = '';

  // ── Filter bar ──────────────────────────────────────────────────────────────
  var sportList = [...new Set(allParlays.flatMap(function(p){ return (p.legs||[]).map(function(l){ return l.sport||'football'; }); }))];
  html += '<div class="section"><div class="section-title">FILTERS</div><div class="filter-row">';
  html += '<select class="filter-sel" onchange="filteredStatus=this.value;render()"><option value="all">All Status</option><option value="won">Won</option><option value="lost">Lost</option><option value="pending">Pending</option></select>';
  html += '<div>';
  html += '<span class="sport-chip '+(filteredSport==='all'?'active':'')+'" onclick="filteredSport=\'all\';render()">All Sports</span>';
  sportList.forEach(function(s) {
    html += '<span class="sport-chip '+(filteredSport===s?'active':'')+'" onclick="filteredSport=\''+s+'\';render()">'+sportIcon(s)+' '+s+'</span>';
  });
  html += '</div></div></div>';

  // ── Hero stats ──────────────────────────────────────────────────────────────
  var wrColor = m.winRate === null ? 'var(--text3)' : m.winRate >= 50 ? 'var(--green)' : m.winRate >= 30 ? 'var(--orange)' : 'var(--red)';
  var roiColor = m.roi === null ? 'var(--text3)' : m.roi >= 0 ? 'var(--green)' : 'var(--red)';
  html += '<div class="hero-stats">';
  var heroItems = [
    {v: m.total, l:'TOTAL PARLAYS', s:'', c:'var(--accent)'},
    {v: m.winRate !== null ? m.winRate.toFixed(1)+'%' : '—', l:'WIN RATE', s: m.settled+' settled', c: wrColor, highlight: m.winRate >= 50},
    {v: m.legHitRate !== null ? m.legHitRate.toFixed(1)+'%' : '—', l:'LEG HIT RATE', s: m.totalLegs+' total legs', c:'var(--teal)'},
    {v: m.roi !== null ? (m.roi >= 0 ? '+':'')+m.roi.toFixed(1)+'%' : '—', l:'EST. ROI', s:'£10/parlay basis', c: roiColor, highlight: m.roi >= 0},
    {v: m.avgOdds ? m.avgOdds.toFixed(2)+'x' : '—', l:'AVG ODDS', s:'', c:'var(--gold)'},
    {v: m.avgConf ? Math.round(m.avgConf)+'/100' : '—', l:'AVG CONFIDENCE', s:'', c:'var(--purple)'},
    {v: m.currentStreak > 0 ? (m.streakType==='won'?'🔥':'❄️')+' '+m.currentStreak : '—', l:'CURRENT STREAK', s: m.bestStreak > 0 ? 'Best: '+m.bestStreak : '', c: m.streakType==='won'?'var(--green)':'var(--red)'},
    {v: m.pending, l:'PENDING', s:'awaiting results', c:'var(--text3)'},
  ];
  heroItems.forEach(function(x) {
    html += '<div class="hero-card'+(x.highlight?' highlight':'')+'"><div class="hero-val" style="color:'+x.c+'">'+x.v+'</div><div class="hero-lbl">'+x.l+'</div>'+(x.s?'<div class="hero-sub">'+x.s+'</div>':'')+'</div>';
  });
  html += '</div>';

  // ── Won/Lost breakdown callout ──────────────────────────────────────────────
  if (m.wonConf && m.lostConf) {
    html += '<div class="alert-box">💡 <strong>Confidence calibration:</strong> Your winning parlays averaged <strong style="color:var(--green)">' + Math.round(m.wonConf) + '/100</strong> confidence vs <strong style="color:var(--red)">' + Math.round(m.lostConf) + '/100</strong> for losing ones. '+(m.wonConf > m.lostConf ? 'The confidence score is doing its job — higher scores correlate with wins.' : 'Try increasing the minimum confidence threshold when building parlays.')+'</div>';
  }

  // ── Accuracy over time + Sport breakdown ────────────────────────────────────
  html += '<div class="grid-2">';

  // Accuracy over time chart
  var monthKeys = Object.keys(m.byMonth).sort();
  html += '<div class="section"><div class="section-title">ACCURACY OVER TIME</div>';
  if (monthKeys.length < 2) {
    html += '<div style="text-align:center;padding:40px;font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3)">Need more settled parlays to show trend.</div>';
  } else {
    html += '<div class="chart-wrap"><canvas id="timeChart"></canvas></div>';
  }
  html += '</div>';

  // Confidence calibration
  html += '<div class="section"><div class="section-title">CONFIDENCE CALIBRATION</div>';
  var buckets = m.confBuckets;
  var bucketKeys = ['10-30','31-50','51-65','66-80','81+'];
  var bucketColors = ['var(--red)','var(--orange)','var(--gold)','var(--teal)','var(--green)'];
  html += '<div style="margin-top:4px">';
  bucketKeys.forEach(function(key, i) {
    var b = buckets[key];
    var actualRate = b.total > 0 ? Math.round(b.wins/b.total*100) : null;
    var midConf = {
      '10-30': 20, '31-50': 40, '51-65': 57, '66-80': 73, '81+': 87
    }[key];
    html += '<div class="calibration-row">';
    html += '<span class="cal-lbl" style="color:'+bucketColors[i]+'">'+key+'%</span>';
    html += '<div class="cal-bar-wrap">';
    if (actualRate !== null) html += '<div class="cal-bar-actual" style="width:'+actualRate+'%;background:'+bucketColors[i]+'"></div>';
    html += '<div class="cal-bar-pred" style="left:'+midConf+'%"></div>';
    html += '</div>';
    html += '<span class="cal-num">'+(actualRate !== null ? actualRate+'% ('+b.total+')' : '—')+'</span>';
    html += '</div>';
  });
  html += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3);margin-top:8px">Bar = actual win rate · Gold line = predicted confidence midpoint</div>';
  html += '</div></div>';
  html += '</div>'; // end grid-2

  // ── Sport breakdown + Market breakdown ──────────────────────────────────────
  html += '<div class="grid-2">';

  // Sport breakdown
  html += '<div class="section"><div class="section-title">BY SPORT <span style="font-size:8px;color:var(--text3)">(click to filter)</span></div>';
  var sportColors = {football:'var(--green)',basketball:'var(--orange)',tennis:'var(--teal)',f1:'var(--red)',boxing:'var(--purple)',mma:'var(--gold)',american_football:'var(--orange)'};
  var sportEntries = Object.entries(m.bySport).sort(function(a,b){ return b[1].total - a[1].total; });
  if (!sportEntries.length) {
    html += '<div style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3);text-align:center;padding:20px">No sport data yet</div>';
  } else {
    html += '<div style="margin-bottom:10px"><canvas id="sportChart" height="160"></canvas></div>';
    sportEntries.forEach(function(entry) {
      var s = entry[0], d = entry[1];
      var wr = d.won+d.lost > 0 ? Math.round(d.won/(d.won+d.lost)*100) : null;
      var col = sportColors[s] || 'var(--accent)';
      html += '<div onclick="filteredSport=\''+s+'\';render()" style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .15s;margin-bottom:3px" onmouseover="this.style.background=\'rgba(0,200,248,.05)\'" onmouseout="this.style.background=\'\'">';
      html += '<span style="font-size:14px">'+sportIcon(s)+'</span>';
      html += '<span style="flex:1;font-size:12px;font-weight:600;color:var(--text)">'+s+'</span>';
      html += '<div style="display:flex;gap:8px;font-family:\'JetBrains Mono\';font-size:9px">';
      html += '<span style="color:var(--text3)">'+d.total+' total</span>';
      if (wr !== null) html += '<span style="color:'+col+'">'+wr+'% WR</span>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  // Market breakdown
  html += '<div class="section"><div class="section-title">BY MARKET TYPE</div>';
  var mktEntries = Object.entries(m.byMarket).sort(function(a,b){ return b[1].total - a[1].total; });
  if (!mktEntries.length) {
    html += '<div style="font-family:\'JetBrains Mono\';font-size:10px;color:var(--text3);text-align:center;padding:20px">No market data yet</div>';
  } else {
    mktEntries.forEach(function(entry) {
      var mkt = entry[0], d = entry[1];
      var hitRate = d.total > 0 ? Math.round(d.hits/d.total*100) : null;
      var col = hitRate === null ? 'var(--text3)' : hitRate >= 60 ? 'var(--green)' : hitRate >= 40 ? 'var(--orange)' : 'var(--red)';
      html += '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(14,32,64,.5)">';
      html += '<span style="flex:1;font-size:12px;color:var(--text)">'+mkt+'</span>';
      html += '<span style="font-family:\'JetBrains Mono\';font-size:9px;color:var(--text3)">'+d.total+' legs</span>';
      if (hitRate !== null) {
        html += '<div style="width:80px"><div style="height:4px;background:var(--border);border-radius:2px"><div style="width:'+hitRate+'%;height:100%;background:'+col+';border-radius:2px"></div></div>';
        html += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:'+col+';text-align:right;margin-top:1px">'+hitRate+'%</div></div>';
      } else {
        html += '<span style="font-family:\'JetBrains Mono\';font-size:9px;color:var(--text3)">pending</span>';
      }
      html += '</div>';
    });
  }
  html += '</div>';
  html += '</div>'; // end grid-2

  // ── Recent history ──────────────────────────────────────────────────────────
  html += '<div class="section"><div class="section-title">RECENT PARLAY HISTORY <span style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">('+toUse.length+' total)</span></div>';
  html += '<div id="historyList">';
  toUse.slice(0, 20).forEach(function(p, i) {
    var legs = p.legs || [];
    var co = parseFloat(p.combined_odds || legs.reduce(function(x,l){return x*(l.odds||1);},1)).toFixed(2);
    var sc = p.confidence_score || 0;
    var ds = p.created_at ? new Date(p.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
    var statusCls = p.status === 'won' ? 's-won' : p.status === 'lost' ? 's-lost' : 's-pending';
    var sports = [...new Set(legs.map(function(l){ return l.sport||'football'; }))].map(sportIcon).join(' ');

    html += '<div class="parlay-history-row" onclick="toggleParlay('+i+')">';
    html += '<div style="flex:1">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
    html += '<span class="status-pill '+statusCls+'">'+(p.status||'PENDING').toUpperCase()+'</span>';
    html += '<span style="font-size:11px;font-weight:600;color:var(--text)">'+legs.length+'-Leg @ '+co+'x</span>';
    html += '<span style="font-size:10px">'+sports+'</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:10px;font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">';
    html += '<span>'+ds+'</span>';
    html += '<span>Score: <span style="color:var(--accent)">'+sc+'/100</span></span>';
    if (p.hits_count !== null && p.hits_count !== undefined) html += '<span>Hits: <span style="color:var(--green)">'+p.hits_count+'/'+legs.length+'</span></span>';
    html += '</div>';
    html += '</div>';
    html += '<div id="ph-toggle-'+i+'" style="font-size:9px;color:var(--text3);transform:rotate(0deg);transition:transform .2s">▼</div>';
    html += '</div>';

    // Expandable legs
    html += '<div id="ph-legs-'+i+'" style="display:none;padding:8px 14px 10px;background:rgba(0,0,0,.2);border-radius:0 0 7px 7px">';
    legs.forEach(function(leg, li) {
      var lr = p.leg_results && p.leg_results[li];
      var hit = lr ? (lr.result === 'won' || lr.hit === true) : null;
      var hitCls = hit === null ? 'lr-pending' : hit ? 'lr-hit' : 'lr-miss';
      var hitIcon = hit === null ? '⏳' : hit ? '✅' : '❌';
      html += '<div class="leg-result-row">';
      html += '<span style="font-size:11px">'+hitIcon+'</span>';
      html += '<span class="'+hitCls+'">'+( leg.matchName||'Match')+' — '+(leg.label||leg.pick)+'</span>';
      html += '<span style="margin-left:auto;font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">@'+leg.odds+' · '+(leg.prob||0)+'%</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';

  // ── Leg count analysis ──────────────────────────────────────────────────────
  html += '<div class="section"><div class="section-title">LEG COUNT ANALYSIS</div>';
  var byLegs = {};
  toUse.forEach(function(p) {
    var n = parseInt(p.leg_count) || (p.legs||[]).length;
    if (!n) return;
    if (!byLegs[n]) byLegs[n] = {total:0,won:0,lost:0};
    byLegs[n].total++;
    if (p.status==='won') byLegs[n].won++;
    else if (p.status==='lost') byLegs[n].lost++;
  });
  html += '<div class="metric-mini-grid">';
  Object.keys(byLegs).sort(function(a,b){return a-b;}).forEach(function(n) {
    var d = byLegs[n];
    var wr = d.won+d.lost > 0 ? Math.round(d.won/(d.won+d.lost)*100) : null;
    var col = wr === null ? 'var(--text3)' : wr >= 50 ? 'var(--green)' : wr >= 25 ? 'var(--orange)' : 'var(--red)';
    html += '<div class="metric-mini">';
    html += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:2px">'+n+'-LEG</div>';
    html += '<div class="metric-mini-val" style="color:'+col+'">'+(wr !== null ? wr+'%' : '—')+'</div>';
    html += '<div class="metric-mini-lbl">WIN RATE ('+d.total+')</div>';
    html += '</div>';
  });
  html += '</div></div>';

  document.getElementById('mainContent').innerHTML = html;

  // ── Render charts ───────────────────────────────────────────────────────────
  if (monthKeys.length >= 2) {
    var ctx = document.getElementById('timeChart');
    if (ctx) {
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: monthKeys.map(function(k){ return k.slice(0,7); }),
          datasets: [{
            label: 'Win Rate %',
            data: monthKeys.map(function(k){ var b=m.byMonth[k]; return b.total>0?Math.round(b.won/b.total*100):null; }),
            borderColor: '#00ff88',
            backgroundColor: 'rgba(0,255,136,.08)',
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#00ff88',
            pointRadius: 4,
          },{
            label: 'Parlays Settled',
            data: monthKeys.map(function(k){ return m.byMonth[k].total; }),
            borderColor: '#00c8f8',
            borderDash: [4,4],
            backgroundColor: 'transparent',
            tension: 0.3,
            pointRadius: 3,
            yAxisID: 'y2'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#7a9bbf', font: { family: 'JetBrains Mono', size: 9 } } } },
          scales: {
            x: { ticks: { color:'#3a5a7a', font:{family:'JetBrains Mono',size:8} }, grid: { color:'#0e2040' } },
            y: { ticks: { color:'#7a9bbf', font:{family:'JetBrains Mono',size:8}, callback: function(v){ return v+'%'; } }, grid: { color:'#0e2040' }, min:0, max:100 },
            y2: { position:'right', ticks:{ color:'#3a5a7a', font:{family:'JetBrains Mono',size:8} }, grid:{display:false} }
          }
        }
      });
    }
  }

  if (sportEntries.length) {
    var sCtx = document.getElementById('sportChart');
    if (sCtx) {
      var SPORT_COLORS_CHART = ['#00c8f8','#00ff88','#ffd700','#ff8c42','#a855f7','#ff3b5c','#00e5c8'];
      new Chart(sCtx, {
        type: 'doughnut',
        data: {
          labels: sportEntries.map(function(e){ return e[0]; }),
          datasets: [{ data: sportEntries.map(function(e){ return e[1].total; }), backgroundColor: SPORT_COLORS_CHART, borderWidth: 2, borderColor: '#0a1628' }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position:'right', labels:{ color:'#7a9bbf', font:{family:'JetBrains Mono',size:9}, boxWidth:10 } } }
        }
      });
    }
  }
}

// ─── TOGGLE HISTORY ROW ───────────────────────────────────────────────────────
function toggleParlay(i) {
  var legs = document.getElementById('ph-legs-'+i);
  var toggle = document.getElementById('ph-toggle-'+i);
  if (!legs) return;
  var open = legs.style.display !== 'none';
  legs.style.display = open ? 'none' : 'block';
  if (toggle) toggle.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function sportIcon(s) {
  var icons = {football:'⚽',basketball:'🏀',american_football:'🏈',tennis:'🎾',f1:'🏎️',boxing:'🥊',mma:'🥋'};
  return icons[s] || '🏅';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
