<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/mobile.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip IQ — Accuracy Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8);--sw:224px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .nav{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100}
    .nl{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;text-decoration:none;color:var(--text2);transition:all .15s;font-size:13px}
    .nl:hover{background:rgba(0,200,248,.06);color:var(--text)}
    .nl.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
    .nlg{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--border)}
    .nlt{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nlsub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px}
    .nls{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;padding:10px 14px 3px;text-transform:uppercase}
    .nb{margin-top:auto;padding:10px 0;border-top:1px solid var(--border)}
    .ubtn{margin:6px 10px;background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1px;padding:8px 12px;border-radius:7px;border:none;cursor:pointer;text-align:center;display:block;text-decoration:none}
    .main{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column}
    .top{background:var(--panel);border-bottom:1px solid var(--border2);height:46px;display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
    .top-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .bsm{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.25);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:5px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .bsm:hover{background:rgba(0,200,248,.2)}
    .content{padding:16px;display:flex;flex-direction:column;gap:14px}
    .section{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px}
    .sh{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    /* Hero */
    .hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
    .hc{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .hc:hover{border-color:rgba(0,200,248,.4);transform:translateY(-1px)}
    .hc.good{border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.03)}
    .hc.warn{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.03)}
    .hc.bad{border-color:rgba(255,59,92,.35);background:rgba(255,59,92,.03)}
    .hv{font-family:'Bebas Neue';font-size:38px;line-height:1}
    .hl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;margin-top:2px}
    .hs{font-size:9px;color:var(--text3);margin-top:2px}
    /* League table */
    .lt-row{display:flex;align-items:center;gap:8px;padding:6px 7px;border-bottom:1px solid rgba(14,32,64,.5);border-radius:4px;transition:background .15s;cursor:default}
    .lt-row:hover{background:rgba(0,200,248,.04)}
    .lt-row:last-child{border-bottom:none}
    .lt-badge{font-family:'JetBrains Mono';font-size:7px;padding:2px 5px;border-radius:10px;letter-spacing:1px;white-space:nowrap}
    .acc-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .acc-bar{height:100%;border-radius:3px;transition:width .6s ease}
    /* Recent predictions */
    .pred-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid transparent;margin-bottom:4px;transition:all .15s}
    .pred-row.correct{border-color:rgba(0,255,136,.2);background:rgba(0,255,136,.03)}
    .pred-row.incorrect{border-color:rgba(255,59,92,.2);background:rgba(255,59,92,.03)}
    .pred-row.pending{border-color:rgba(58,90,122,.3)}
    .pr-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
    .ico-c{background:rgba(0,255,136,.15);color:var(--green)}
    .ico-w{background:rgba(255,59,92,.15);color:var(--red)}
    .ico-p{background:rgba(58,90,122,.2);color:var(--text3)}
    /* Sport pills */
    .sp-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;cursor:pointer;border:1px solid var(--border2);color:var(--text3);transition:all .2s;margin:2px}
    .sp-pill:hover,.sp-pill.on{border-color:var(--accent);color:var(--accent);background:rgba(0,200,248,.08)}
    /* Cal bars */
    .cal-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
    .cal-lbl{font-family:'JetBrains Mono';font-size:9px;width:50px;flex-shrink:0}
    .cal-wrap{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
    .cal-actual{height:100%;border-radius:4px;transition:width .5s ease}
    .cal-pred{position:absolute;top:0;width:2px;height:100%}
    .cal-num{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);width:60px;text-align:right;flex-shrink:0}
    /* Parlay rows */
    .prow{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid rgba(14,32,64,.4);cursor:pointer;border-radius:5px;transition:background .15s}
    .prow:hover{background:rgba(0,200,248,.04)}
    .prow:last-child{border-bottom:none}
    .spill{font-family:'JetBrains Mono';font-size:8px;padding:2px 7px;border-radius:10px;letter-spacing:1px}
    .sw{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
    .sl{background:rgba(255,59,92,.15);color:var(--red);border:1px solid rgba(255,59,92,.3)}
    .sp{background:rgba(0,200,248,.1);color:var(--accent);border:1px solid rgba(0,200,248,.25)}
    .sa{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
    /* Chart */
    .chw{position:relative;height:180px}
    .chw canvas{max-height:180px}
    /* Learn note */
    .learn-note{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.25);border-radius:7px;padding:10px 13px;font-size:12px;color:var(--text2);line-height:1.7;margin-top:10px}
    .spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--text3);padding:32px 16px;line-height:1.9}
  </style>
</head>
<body>
<div class="nav">
  <div class="nlg">
    <span style="font-size:18px">⚡</span>
    <div><div class="nlt">SLIP IQ</div><div class="nlsub">INTELLIGENCE v14</div></div>
  </div>
  <div class="nls">MAIN</div>
  <a class="nl" href="home.html"><span style="width:20px;text-align:center">⚽</span> Matches</a>
  <a class="nl" href="home.html"><span style="width:20px;text-align:center">🎯</span> My Parlays</a>
  <a class="nl" href="leagues.html"><span style="width:20px;text-align:center">🏆</span> Leagues</a>
  <a class="nl active" href="accuracy.html"><span style="width:20px;text-align:center">📊</span> Accuracy</a>
  <div class="nls">ACCOUNT</div>
  <a class="nl" href="account.html"><span style="width:20px;text-align:center">👤</span> Profile</a>
  <a class="nl" href="subscriptions.html"><span style="width:20px;text-align:center">🛒</span> Plans</a>
  <a class="nl" href="info.html"><span style="width:20px;text-align:center">ℹ️</span> How To Use</a>
  <div class="nb"><a href="subscriptions.html" class="ubtn">⭐ UPGRADE PLAN</a></div>
</div>

<div class="main">
  <div class="top">
    <div class="top-title">📊 ACCURACY DASHBOARD</div>
    <div style="display:flex;align-items:center;gap:7px;margin-left:auto">
      <span id="lu" style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3)"></span>
      <button class="bsm" onclick="load()">⟳ REFRESH</button>
      <a href="home.html" class="bsm">← MATCHES</a>
    </div>
  </div>
  <div class="content" id="root"><div class="spinner"></div></div>
</div>

<script>
var USER_ID = null, _sb = null
var currentSport = 'all', currentStatus = 'all'
var _data = null

async function init() {
  try {
    if (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
      var { data: sd } = await _sb.auth.getSession()
      if (sd?.session?.user) USER_ID = sd.session.user.id
    }
  } catch(e) {}
  if (!USER_ID) {
    for (var k in localStorage) {
      if (k.indexOf('sb-') === 0 && k.indexOf('-auth-token') !== -1) {
        try {
          var p = JSON.parse(localStorage.getItem(k))
          var uid = p?.user?.id || p?.session?.user?.id
          if (uid) { USER_ID = uid; break }
        } catch(e2) {}
      }
    }
  }
  await load()
}

async function load() {
  document.getElementById('root').innerHTML = '<div class="spinner"></div>'
  try {
    var qs = USER_ID ? '?userId=' + encodeURIComponent(USER_ID) : ''
    var r = await fetch('/accuracy/full' + qs, { headers: { 'x-user-id': USER_ID || '' } })
    _data = r.ok ? await r.json() : null

    // Also pull any local parlays as fallback
    if (_data) {
      var local = []
      try { local = JSON.parse(localStorage.getItem('slipiq_parlays') || '[]') } catch(e) {}
      var serverIds = new Set((_data.parlays||[]).map(function(p){ return String(p.id) }))
      local.forEach(function(lp) {
        if (!serverIds.has(String(lp.id))) {
          var legs = typeof lp.legs === 'string' ? JSON.parse(lp.legs||'[]') : lp.legs||[]
          var lr = typeof lp.leg_results === 'string' ? JSON.parse(lp.leg_results||'null') : lp.leg_results
          _data.parlays.push(Object.assign({}, lp, { legs: legs, leg_results: lr }))
        }
      })
    }

    document.getElementById('lu').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
    render()
  } catch(e) {
    document.getElementById('root').innerHTML = '<div class="empty">⚠️<br><br>Could not load accuracy data.<br>Make sure your server is running and Supabase is connected.</div>'
  }
}

function render() {
  if (!_data) { document.getElementById('root').innerHTML = '<div class="empty">No data yet — predictions are tracked automatically as matches are built.</div>'; return }
  var s = _data.summary || {}
  var parlays = (_data.parlays || []).filter(function(p) {
    if (currentStatus !== 'all' && p.status !== currentStatus) return true // keep pending
    return true
  })

  var html = ''

  // ── Model accuracy hero ───────────────────────────────────────────────────
  var acc = s.accuracy
  var accCol = acc === null ? 'var(--text3)' : acc >= 55 ? 'var(--green)' : acc >= 45 ? 'var(--orange)' : 'var(--red)'
  var accClass = acc === null ? '' : acc >= 55 ? 'good' : acc >= 45 ? 'warn' : 'bad'
  html += '<div class="hero">'
  var hItems = [
    { v: acc !== null ? acc.toFixed(1)+'%' : '—', l:'PREDICTION ACCURACY', s: s.total+' predictions resolved', c: accCol, cls: accClass },
    { v: s.total || 0, l:'TOTAL TRACKED', s: (s.pending||0)+' pending', c:'var(--accent)', cls:'' },
    { v: s.upsetAccuracy !== null ? s.upsetAccuracy+'%' : '—', l:'UPSET ACCURACY', s: (s.upsetTotal||0)+' upsets called', c:'var(--gold)', cls: s.upsetAccuracy >= 40 ? 'good' : '' },
    { v: s.valueBetAccuracy !== null ? s.valueBetAccuracy+'%' : '—', l:'VALUE BET ACCURACY', s: (s.valueBetTotal||0)+' value bets', c:'var(--teal)', cls: s.valueBetAccuracy >= 55 ? 'good' : '' },
    { v: s.correct || 0, l:'CORRECT CALLS', s: 'all sports', c:'var(--green)', cls: (s.correct||0) > 0 ? 'good' : '' },
    { v: s.incorrect || 0, l:'WRONG CALLS', s: 'learning in progress', c:'var(--red)', cls: '' },
  ]
  hItems.forEach(function(x) {
    html += '<div class="hc '+x.cls+'" style="border-color:rgba(0,200,248,.15)" onclick="">'
    html += '<div class="hv" style="color:'+x.c+'">'+x.v+'</div>'
    html += '<div class="hl">'+x.l+'</div>'
    html += '<div class="hs">'+x.s+'</div></div>'
  })
  html += '</div>'

  // ── Sport filter pills ────────────────────────────────────────────────────
  var sportKeys = Object.keys(_data.bySport || {})
  if (sportKeys.length > 1) {
    html += '<div class="section" style="padding:10px 14px">'
    html += '<span class="sp-pill '+(currentSport==='all'?'on':'')+'" onclick="currentSport=\'all\';render()">All Sports</span>'
    sportKeys.forEach(function(s) {
      html += '<span class="sp-pill '+(currentSport===s?'on':'')+'" onclick="currentSport=\''+s+'\';render()">'+sportIcon(s)+' '+s+'</span>'
    })
    html += '</div>'
  }

  // ── Chart + Confidence cal ────────────────────────────────────────────────
  var monthKeys = Object.keys(_data.byMonth||{}).sort()
  html += '<div class="g2">'

  html += '<div class="section"><div class="sh">ACCURACY TREND</div>'
  if (monthKeys.length >= 2) {
    html += '<div class="chw"><canvas id="trendChart"></canvas></div>'
  } else {
    html += '<div class="empty" style="padding:20px">Needs 2+ months of resolved predictions to show trend.</div>'
  }
  html += '</div>'

  html += '<div class="section"><div class="sh">CONFIDENCE CALIBRATION<span style="font-size:8px;color:var(--text3)">BAR = ACTUAL · LINE = PREDICTED</span></div>'
  var bkMap = {'40-55':{c:'var(--red)',mid:47},'56-65':{c:'var(--orange)',mid:60},'66-75':{c:'var(--gold)',mid:70},'76-85':{c:'var(--teal)',mid:80},'86+':{c:'var(--green)',mid:90}}
  Object.entries(_data.confBuckets||{}).forEach(function(entry) {
    var key = entry[0], b = entry[1]
    var col = (bkMap[key]||{}).c || 'var(--text3)'
    var mid = (bkMap[key]||{}).mid || 70
    var rate = b.t > 0 ? Math.round(b.c/b.t*100) : null
    html += '<div class="cal-row">'
    html += '<span class="cal-lbl" style="color:'+col+'">'+key+'%</span>'
    html += '<div class="cal-wrap">'
    if (rate !== null) html += '<div class="cal-actual" style="width:'+rate+'%;background:'+col+'"></div>'
    html += '<div class="cal-pred" style="left:'+mid+'%;background:var(--gold)"></div>'
    html += '</div>'
    html += '<span class="cal-num">'+(rate !== null ? rate+'% ('+b.t+')' : '— (0)')+'</span>'
    html += '</div>'
  })
  html += '</div>'
  html += '</div>'

  // ── By League + By Sport ──────────────────────────────────────────────────
  html += '<div class="g2">'

  // League table
  var leagueEntries = Object.entries(_data.byLeague||{})
    .filter(function(e) { return e[1].total >= 3 })
    .sort(function(a,b){ return b[1].total - a[1].total })
  html += '<div class="section"><div class="sh">ACCURACY BY LEAGUE</div>'
  if (!leagueEntries.length) {
    html += '<div class="empty" style="padding:16px">No league data yet.</div>'
  } else {
    leagueEntries.slice(0, 18).forEach(function(entry) {
      var lg = entry[0], d = entry[1]
      var rate = d.total > 0 ? Math.round(d.correct/d.total*100) : 0
      var col = rate >= 60 ? 'var(--green)' : rate >= 45 ? 'var(--orange)' : 'var(--red)'
      html += '<div class="lt-row">'
      html += '<span style="font-size:11px">'+leagueFlag(lg)+'</span>'
      html += '<span style="flex:1;font-size:11px;color:var(--text)">'+lg+'</span>'
      html += '<div class="acc-bar-wrap"><div class="acc-bar" style="width:'+rate+'%;background:'+col+'"></div></div>'
      html += '<span style="font-family:\'JetBrains Mono\';font-size:9px;color:'+col+';width:36px;text-align:right">'+rate+'%</span>'
      html += '<span style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3);width:28px;text-align:right">'+d.total+'</span>'
      html += '</div>'
    })
  }
  html += '</div>'

  // Sport breakdown
  var sportEntries = Object.entries(_data.bySport||{}).sort(function(a,b){ return b[1].total-a[1].total })
  html += '<div class="section"><div class="sh">BY SPORT</div>'
  if (!sportEntries.length) {
    html += '<div class="empty" style="padding:16px">No data yet.</div>'
  } else {
    html += '<div class="chw" style="height:160px"><canvas id="sportChart"></canvas></div>'
    sportEntries.forEach(function(entry) {
      var sp = entry[0], d = entry[1]
      var rate = d.total > 0 ? Math.round(d.correct/d.total*100) : null
      var col = rate === null ? 'var(--text3)' : rate >= 55 ? 'var(--green)' : rate >= 42 ? 'var(--orange)' : 'var(--red)'
      html += '<div class="lt-row">'
      html += '<span style="font-size:14px;width:20px">'+sportIcon(sp)+'</span>'
      html += '<span style="flex:1;font-size:11px;font-weight:600;color:var(--text)">'+sp+'</span>'
      html += '<span style="font-family:\'JetBrains Mono\';font-size:9px;color:var(--text3)">'+d.total+' total</span>'
      if (rate !== null) html += '<span class="lt-badge" style="background:rgba(0,200,248,.1);color:var(--accent);border:1px solid rgba(0,200,248,.25)">'+rate+'% ACC</span>'
      html += '</div>'
    })
  }
  html += '</div>'
  html += '</div>'

  // ── Upset & Value breakdown ───────────────────────────────────────────────
  html += '<div class="g2">'
  html += '<div class="section"><div class="sh">UPSET WATCH ACCURACY</div>'
  if (!s.upsetTotal) {
    html += '<div class="empty" style="padding:16px">No upset predictions resolved yet.</div>'
  } else {
    var upc = s.upsetAccuracy
    var upcol = upc >= 40 ? 'var(--green)' : upc >= 25 ? 'var(--orange)' : 'var(--red)'
    html += '<div style="display:flex;gap:12px;margin-bottom:12px">'
    html += '<div style="text-align:center;flex:1"><div style="font-family:\'Bebas Neue\';font-size:42px;color:'+upcol+'">'+upc+'%</div><div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">UPSET ACCURACY</div></div>'
    html += '<div style="text-align:center;flex:1"><div style="font-family:\'Bebas Neue\';font-size:28px;color:var(--gold)">'+s.upsetCorrect+'/'+s.upsetTotal+'</div><div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">CORRECT/TOTAL</div></div>'
    html += '</div>'
    html += '<div style="font-size:12px;color:var(--text2);line-height:1.7">Upsets are matches where Slip IQ flagged a lower-probability away win. Tracking these separately helps calibrate the upset detection model.</div>'
  }
  html += '</div>'

  html += '<div class="section"><div class="sh">VALUE BET PERFORMANCE</div>'
  if (!s.valueBetTotal) {
    html += '<div class="empty" style="padding:16px">No value bets resolved yet.</div>'
  } else {
    var vpc = s.valueBetAccuracy
    var vpcol = vpc >= 55 ? 'var(--green)' : vpc >= 40 ? 'var(--orange)' : 'var(--red)'
    html += '<div style="display:flex;gap:12px;margin-bottom:12px">'
    html += '<div style="text-align:center;flex:1"><div style="font-family:\'Bebas Neue\';font-size:42px;color:'+vpcol+'">'+vpc+'%</div><div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">VALUE BET ACCURACY</div></div>'
    html += '<div style="text-align:center;flex:1"><div style="font-family:\'Bebas Neue\';font-size:28px;color:var(--teal)">'+s.valueBetCorrect+'/'+s.valueBetTotal+'</div><div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">CORRECT/TOTAL</div></div>'
    html += '</div>'
    html += '<div style="font-size:12px;color:var(--text2);line-height:1.7">Value bets are cases where the model\'s edge probability exceeded the implied bookmaker probability by 4%+. A value bet accuracy above 50% generates long-run profit.</div>'
  }
  html += '</div>'
  html += '</div>'

  // ── Recent predictions ───────────────────────────────────────────────────
  var recent = (_data.recent || []).filter(function(p) {
    if (currentSport !== 'all' && p.sport !== currentSport) return false
    return true
  })
  html += '<div class="section"><div class="sh">RECENT PREDICTIONS — AUTO TRACKED<span style="font-size:8px;color:var(--text3)">'+recent.length+' shown</span></div>'
  if (!recent.length) {
    html += '<div class="empty" style="padding:16px">No resolved predictions yet. They appear here automatically after each match ends.</div>'
  } else {
    recent.slice(0,24).forEach(function(p) {
      var isCorrect = p.correct === true
      var isPending = p.correct === null || p.correct === undefined
      var rowClass = isPending ? 'pending' : isCorrect ? 'correct' : 'incorrect'
      var icoClass = isPending ? 'ico-p' : isCorrect ? 'ico-c' : 'ico-w'
      var icoChar  = isPending ? '⏳' : isCorrect ? '✓' : '✗'
      var score = (p.actual_home_score !== null && p.actual_away_score !== null)
        ? p.actual_home_score+'-'+p.actual_away_score : ''
      html += '<div class="pred-row '+rowClass+'">'
      html += '<div class="pr-icon '+icoClass+'">'+icoChar+'</div>'
      html += '<div style="flex:1;min-width:0">'
      html += '<div style="font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.home_team+' vs '+p.away_team+'</div>'
      html += '<div style="font-size:9px;color:var(--text3);font-family:\'JetBrains Mono\'">'+leagueFlag(p.league||'')+' '+(p.league||'')+'</div>'
      html += '</div>'
      html += '<div style="text-align:center;flex-shrink:0;padding:0 8px">'
      html += '<div style="font-family:\'JetBrains Mono\';font-size:9px;color:var(--accent)">Predicted: '+capFirst(p.predicted_winner||'')+'</div>'
      html += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">'+p.predicted_team+' ('+p.confidence+'%)</div>'
      html += '</div>'
      if (score) {
        html += '<div style="text-align:center;flex-shrink:0">'
        html += '<div style="font-family:\'Bebas Neue\';font-size:20px;color:'+(isCorrect?'var(--green)':'var(--red)')+'">'+score+'</div>'
        html += '<div style="font-size:8px;color:var(--text3);font-family:\'JetBrains Mono\'">'+(isCorrect?'CORRECT':'WRONG')+'</div>'
        html += '</div>'
      }
      if (p.is_upset_watch) html += '<div style="font-family:\'JetBrains Mono\';font-size:7px;padding:2px 5px;border-radius:3px;background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.3);flex-shrink:0">⚡ UPSET</div>'
      if (p.is_value_bet)   html += '<div style="font-family:\'JetBrains Mono\';font-size:7px;padding:2px 5px;border-radius:3px;background:rgba(0,229,200,.1);color:var(--teal);border:1px solid rgba(0,229,200,.3);flex-shrink:0">💰 VALUE</div>'
      html += '</div>'
    })
  }
  html += '</div>'

  // ── User parlay stats ─────────────────────────────────────────────────────
  var pars = _data.parlays || []
  var pSettled = pars.filter(function(p){ return p.status==='won'||p.status==='lost' })
  var pWon = pars.filter(function(p){ return p.status==='won' })
  var pAutoRes = pars.filter(function(p){ return p.auto_resolved })
  var pWinRate = pSettled.length > 0 ? (pWon.length/pSettled.length*100).toFixed(1) : null
  var pAvgOdds = pars.length > 0 ? (pars.reduce(function(s,p){ return s+parseFloat(p.combined_odds||1) },0)/pars.length).toFixed(2) : null

  html += '<div class="section"><div class="sh">YOUR PARLAY HISTORY — '+(pAutoRes.length ? pAutoRes.length+' AUTO-RESOLVED' : 'AUTO-RESOLVES AS MATCHES END')+'</div>'

  if (!pars.length) {
    html += '<div class="empty" style="padding:16px">No parlays saved yet. Build and save parlays in the main app — they resolve automatically when matches finish.</div>'
  } else {
    html += '<div class="g4" style="margin-bottom:12px">'
    var pStats = [
      { v: pars.length, l:'TOTAL PARLAYS', c:'var(--accent)' },
      { v: pWinRate !== null ? pWinRate+'%' : '—', l:'WIN RATE', c: pWinRate >= 30 ? 'var(--green)' : 'var(--orange)' },
      { v: pAvgOdds ? pAvgOdds+'x' : '—', l:'AVG ODDS', c:'var(--gold)' },
      { v: pAutoRes.length, l:'AUTO-RESOLVED', c:'var(--purple)' },
    ]
    pStats.forEach(function(x) {
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px;text-align:center"><div style="font-family:\'Bebas Neue\';font-size:24px;color:'+x.c+'">'+x.v+'</div><div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3);letter-spacing:1px">'+x.l+'</div></div>'
    })
    html += '</div>'

    pars.slice(0,16).forEach(function(p) {
      var legs = p.legs||[]
      var co = parseFloat(p.combined_odds||legs.reduce(function(x,l){return x*(l.odds||1)},1)).toFixed(2)
      var sc = p.confidence_score||0
      var lr = p.leg_results
      var hits = p.hits_count !== null && p.hits_count !== undefined ? p.hits_count : (Array.isArray(lr) ? lr.filter(function(x){return x&&x.hit}).length : null)
      var sCls = p.status==='won'?'sw':p.status==='lost'?'sl':p.auto_resolved?'sa':'sp'
      var sLbl = p.status==='won'?'WON':p.status==='lost'?'LOST':p.auto_resolved?'RESOLVING':'PENDING'
      html += '<div class="prow" onclick="expandParlay(this,'+JSON.stringify(JSON.stringify(p))+')">'
      html += '<span class="spill '+sCls+'">'+sLbl+'</span>'
      html += '<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+legs.length+'-Leg @ '+co+'x</div>'
      html += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3);margin-top:1px">'
      html += new Date(p.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
      if (p.auto_resolved) html += ' · <span style="color:var(--purple)">🤖 auto</span>'
      html += '</div></div>'
      if (hits !== null) html += '<div style="font-family:\'JetBrains Mono\';font-size:11px;color:'+(p.status==='won'?'var(--green)':p.status==='lost'?'var(--red)':'var(--text3)')+'">'+hits+'/'+legs.length+' hit</div>'
      html += '<div style="font-family:\'Bebas Neue\';font-size:16px;color:var(--gold);margin-left:8px">'+sc+'/100</div>'
      html += '<div style="font-size:11px;color:var(--text3);margin-left:4px">▼</div>'
      html += '</div>'
      html += '<div class="pex" style="display:none;padding:8px 10px 10px;background:rgba(0,0,0,.2);border-radius:0 0 7px 7px;border:1px solid var(--border);border-top:none;margin-bottom:4px"></div>'
    })

    html += '<div class="learn-note">🤖 <strong style="color:var(--purple)">Slip IQ Dynamic Prediction Matrix</strong> — Every auto-resolved match feeds directly into the adaptive weighting engine. Wrong predictions lower the weight of the dominant factor that influenced the call; correct ones reinforce it. Over hundreds of matches, the model self-calibrates per team, per league, and per sport. The accuracy you see here is real-time feedback that makes tomorrow\'s predictions sharper than today\'s.</div>'
  }
  html += '</div>'

  document.getElementById('root').innerHTML = html

  // Render charts
  if (monthKeys.length >= 2) {
    var ctx = document.getElementById('trendChart')
    if (ctx) {
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: monthKeys.map(function(k){ return k.slice(0,7) }),
          datasets: [{
            label: 'Accuracy %',
            data: monthKeys.map(function(k){ var b=_data.byMonth[k]; return b.total>0?Math.round(b.c/b.total*100):null }),
            borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,.07)',
            fill: true, tension: 0.4, pointBackgroundColor: '#00ff88', pointRadius: 4,
          },{
            label: 'Predictions',
            data: monthKeys.map(function(k){ return _data.byMonth[k].total }),
            borderColor: '#00c8f8', borderDash: [4,4], backgroundColor: 'transparent',
            tension: 0.3, pointRadius: 3, yAxisID: 'y2'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color:'#7a9bbf', font:{ family:'JetBrains Mono', size:9 } } } },
          scales: {
            x: { ticks:{ color:'#3a5a7a', font:{family:'JetBrains Mono',size:8} }, grid:{ color:'#0e2040' } },
            y: { ticks:{ color:'#7a9bbf', font:{family:'JetBrains Mono',size:8}, callback:function(v){return v+'%'} }, grid:{ color:'#0e2040' }, min:0, max:100 },
            y2: { position:'right', ticks:{ color:'#3a5a7a', font:{family:'JetBrains Mono',size:8} }, grid:{ display:false } }
          }
        }
      })
    }
  }
  var sportCtx = document.getElementById('sportChart')
  if (sportCtx && sportEntries.length) {
    var SPORT_COLORS = ['#00c8f8','#00ff88','#ffd700','#ff8c42','#a855f7','#ff3b5c','#00e5c8']
    new Chart(sportCtx, {
      type: 'doughnut',
      data: {
        labels: sportEntries.map(function(e){ return e[0] }),
        datasets: [{ data: sportEntries.map(function(e){ return e[1].total }), backgroundColor: SPORT_COLORS, borderWidth: 2, borderColor: '#0a1628' }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ color:'#7a9bbf', font:{family:'JetBrains Mono',size:9}, boxWidth:10 } } } }
    })
  }
}

function expandParlay(row, pjson) {
  var ex = row.nextElementSibling
  if (!ex || !ex.classList.contains('pex')) return
  var open = ex.style.display !== 'none'
  ex.style.display = open ? 'none' : 'block'
  row.querySelector('div:last-child').textContent = open ? '▼' : '▲'
  if (!open && !ex.innerHTML.trim()) {
    var p; try { p = JSON.parse(pjson) } catch(e) { return }
    var legs = p.legs||[], lr = p.leg_results
    var html2 = ''
    legs.forEach(function(leg, i) {
      var res = Array.isArray(lr) && lr[i] ? lr[i] : null
      var hit = res ? res.hit : null
      var score = res ? (res.homeScore+'-'+res.awayScore) : ''
      var icon = hit === null ? '⏳' : hit ? '✅' : '❌'
      var col = hit === null ? 'var(--text3)' : hit ? 'var(--green)' : 'var(--red)'
      html2 += '<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid rgba(14,32,64,.5)">'
      html2 += '<span style="font-size:12px">'+icon+'</span>'
      html2 += '<span style="flex:1;font-size:11px;color:var(--text2)">'+(leg.matchName||'Match')+' — <span style="color:var(--accent)">'+( leg.label||leg.pick)+'</span></span>'
      if (score) html2 += '<span style="font-family:\'JetBrains Mono\';font-size:9px;color:'+col+'">'+score+'</span>'
      html2 += '<span style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--text3)">@'+leg.odds+'</span>'
      html2 += '</div>'
    })
    if (p.auto_resolved) html2 += '<div style="font-family:\'JetBrains Mono\';font-size:8px;color:var(--purple);margin-top:6px">🤖 Auto-resolved by Slip IQ prediction engine</div>'
    ex.innerHTML = html2
  }
}

function capFirst(s) { return s ? s[0].toUpperCase()+s.slice(1) : '' }
function sportIcon(s) {
  var m = {football:'⚽',basketball:'🏀',american_football:'🏈',tennis:'🎾',f1:'🏎️',boxing:'🥊',mma:'🥋'}
  return m[s]||'🏅'
}
function leagueFlag(n) {
  n = (n||'').toLowerCase()
  if (n.includes('premier')) return '🏴󠁧󠁢󠁥󠁮󠁧󠁿'
  if (n.includes('la liga')||n.includes('spain')) return '🇪🇸'
  if (n.includes('serie')) return '🇮🇹'
  if (n.includes('bundesliga')) return '🇩🇪'
  if (n.includes('ligue')) return '🇫🇷'
  if (n.includes('champions')) return '⭐'
  if (n.includes('europa')) return '🟠'
  if (n.includes('nba')||n.includes('basketball')) return '🏀'
  if (n.includes('nfl')) return '🏈'
  return '⚽'
}
window.addEventListener('DOMContentLoaded', init)
</script>
<script src="/mobile-nav.js"></script>
</body>
</html>
