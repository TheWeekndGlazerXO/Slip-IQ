<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip IQ — Leagues</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8);--sidebar:224px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,.015) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.nav-rail{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100;overflow:hidden;transition:width .25s ease}
.nav-rail.collapsed{width:52px}
.nav-logo{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px}
.nav-logo-text{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.nav-logo-sub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;white-space:nowrap}
.nav-toggle{position:absolute;top:14px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;z-index:2}
.nav-toggle:hover{color:var(--accent)}
.nav-section-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;padding:10px 14px 3px;white-space:nowrap}
.nav-rail.collapsed .nav-section-lbl,.nav-rail.collapsed .nav-label,.nav-rail.collapsed .nav-logo-text,.nav-rail.collapsed .nav-logo-sub{display:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--text2);font-size:13px;font-weight:500;white-space:nowrap;text-decoration:none}
.nav-item:hover{background:rgba(0,200,248,.06);color:var(--text)}
.nav-item.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
.nav-rail.collapsed .nav-item{padding:10px 14px;justify-content:center}
.nav-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.nav-label{font-size:13px;font-weight:500}
.nav-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border)}
.upgrade-btn{background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1px;padding:8px;border-radius:7px;border:none;cursor:pointer;display:block;width:100%;text-align:center;text-decoration:none;white-space:nowrap}
.nav-rail.collapsed .upgrade-btn{font-size:0;padding:9px 0}.nav-rail.collapsed .upgrade-btn::before{content:"⭐";font-size:16px}
.main{margin-left:var(--sidebar);transition:margin-left .25s ease;display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.main.collapsed{margin-left:52px}
.topbar{height:50px;background:var(--panel);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:50}
.tb-title{font-family:'Bebas Neue';font-size:21px;letter-spacing:3px;color:var(--text)}
.tb-right{display:flex;align-items:center;gap:7px}
.btn-sm{background:rgba(0,200,248,.08);border:1px solid rgba(0,200,248,.2);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:5px 11px;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center}
.btn-sm:hover{background:rgba(0,200,248,.18)}
.panes{flex:1;display:flex;overflow:hidden}
.leagues-pane{width:228px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pane-hdr{padding:11px 13px;border-bottom:1px solid var(--border);flex-shrink:0}
.pane-hdr-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:7px}
.pane-search{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:'JetBrains Mono';font-size:10px;padding:4px 7px;outline:none}
.pane-search:focus{border-color:var(--accent)}
.leagues-scroll{flex:1;overflow-y:auto}
.leagues-scroll::-webkit-scrollbar{width:3px}
.leagues-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.league-group-lbl{font-family:'JetBrains Mono';font-size:8px;letter-spacing:2px;color:var(--text3);padding:9px 13px 3px;text-transform:uppercase}
.league-row{display:flex;align-items:center;gap:7px;padding:7px 13px;cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.league-row:hover{background:rgba(0,200,248,.05)}
.league-row.active{background:rgba(0,200,248,.1);border-left-color:var(--accent)}
.lr-flag{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.lr-info{flex:1;min-width:0}
.lr-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.league-row.active .lr-name{color:var(--accent)}
.lr-country{font-family:'JetBrains Mono';font-size:8px;color:var(--text3)}
.lr-live{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.standings-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.standings-scroll{flex:1;overflow-y:auto;padding:14px}
.standings-scroll::-webkit-scrollbar{width:4px}
.standings-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.team-pane{width:340px;flex-shrink:0;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.team-scroll{flex:1;overflow-y:auto;padding:14px}
.team-scroll::-webkit-scrollbar{width:3px}
.team-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.league-hero{background:var(--panel);border:1px solid var(--border2);border-radius:11px;padding:14px 16px;margin-bottom:11px;display:flex;align-items:center;gap:14px}
.league-hero-flag{font-size:34px;flex-shrink:0}
.league-hero-name{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:var(--text);line-height:1}
.league-hero-sub{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-top:3px}
.badge{font-family:'JetBrains Mono';font-size:8px;padding:2px 7px;border-radius:4px;letter-spacing:1px}
.badge-league{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.3);color:var(--accent)}
.badge-knockout{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--gold)}
.view-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:11px}
.view-tab{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:7px 13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.view-tab:hover{color:var(--text2)}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.standings-table th.num,.standings-table td.num{text-align:center}
.standings-table td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:12px}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr:hover td{background:rgba(0,200,248,.04);cursor:pointer}
.pos-num{font-family:'JetBrains Mono';font-size:11px;color:var(--text3);min-width:20px;text-align:center;display:inline-block}
.pos-cl{color:var(--accent)!important}.pos-el{color:var(--orange)!important}.pos-rel{color:var(--red)!important}.pos-promo{color:var(--green)!important}
.team-cell{display:flex;align-items:center;gap:7px}
.team-logo{width:20px;height:20px;border-radius:50%;object-fit:contain;background:var(--border2)}
.team-avatar{width:20px;height:20px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--text3);flex-shrink:0}
.team-name-lbl{font-size:12px;color:var(--text);font-weight:500}
.pts-big{font-family:'Bebas Neue';font-size:17px;color:var(--gold);text-align:center}
.form-row{display:flex;gap:2px}
.fp{width:12px;height:12px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700}
.fp-W{background:var(--green);color:#000}.fp-D{background:var(--orange);color:#000}.fp-L{background:var(--red);color:#fff}
.zone-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:9px}
.zone-item{display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}
.zone-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.data-note{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);text-align:center;padding:6px;border:1px solid var(--border);border-radius:5px;margin-top:10px}
.bracket-wrap{overflow-x:auto;padding-bottom:8px}
.bracket{display:flex;gap:14px;align-items:flex-start;min-width:max-content}
.b-round{display:flex;flex-direction:column}
.b-round-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:var(--text3);text-align:center;margin-bottom:8px}
.b-match{background:var(--panel);border:1px solid var(--border2);border-radius:7px;margin-bottom:6px;overflow:hidden;width:146px}
.b-match.final{border-color:var(--gold)}
.b-team{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;font-size:11px;border-bottom:1px solid var(--border)}
.b-team:last-child{border-bottom:none}
.b-team.winner{background:rgba(0,200,248,.08);color:var(--accent);font-weight:600}
.b-team.out{opacity:.45}
.b-team.tbd{color:var(--text3)}
.b-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.b-score{font-family:'JetBrains Mono';font-size:10px;font-weight:700;flex-shrink:0;margin-left:4px}
.b-note{font-size:8px;color:var(--orange);font-family:'JetBrains Mono';margin-left:2px;flex-shrink:0}
.b-upcoming{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);text-align:center;padding:3px 8px}
.team-hero{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.th-name{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:1px}
.th-meta{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-bottom:9px}
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.stat3{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;text-align:center}
.s3v{font-family:'Bebas Neue';font-size:20px;line-height:1}
.s3l{font-family:'JetBrains Mono';font-size:7px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.sec-hdr{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bar-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);width:80px;flex-shrink:0}
.bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.bar-val{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);width:22px;text-align:right;flex-shrink:0}
.player-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.player-row:last-child{border-bottom:none}
.player-row:hover{background:rgba(0,200,248,.04);border-radius:4px}
.pr-pos{font-family:'JetBrains Mono';font-size:7px;padding:1px 3px;border-radius:2px;flex-shrink:0}
.pos-GK{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.pos-DF{background:rgba(0,100,255,.15);color:#6699ff;border:1px solid rgba(0,100,255,.3)}
.pos-MF{background:rgba(0,200,248,.12);color:var(--accent);border:1px solid rgba(0,200,248,.25)}
.pos-FW{background:rgba(255,59,92,.12);color:var(--red);border:1px solid rgba(255,59,92,.25)}
.pr-name{flex:1;font-size:11px;color:var(--text2)}
.pr-stat{font-family:'JetBrains Mono';font-size:8px;color:var(--text3)}
.pr-elo{font-family:'JetBrains Mono';font-size:9px;color:var(--gold)}
.elo-table{width:100%;border-collapse:collapse}
.elo-table th{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);letter-spacing:1px}
.elo-table td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.elo-table tr:last-child td{border-bottom:none}
.elo-val{font-family:'Bebas Neue';font-size:17px;color:var(--gold)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:14px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:13px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:18px;position:relative;margin-top:20px}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border2)}
.modal-close{position:absolute;top:13px;right:13px;color:var(--text3);cursor:pointer;font-size:16px}
.modal-close:hover{color:var(--red)}
.pm-elo{text-align:center;padding:12px;background:rgba(0,200,248,.06);border:1px solid rgba(0,200,248,.2);border-radius:8px;margin:10px 0}
.pm-elo-num{font-family:'Bebas Neue';font-size:44px;color:var(--accent);line-height:1}
.pm-elo-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px}
.pm-elo-grade{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);margin-top:2px}
.scout-box{background:rgba(0,229,200,.05);border:1px solid rgba(0,229,200,.2);border-radius:7px;padding:9px;margin-top:9px}
.scout-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--teal);letter-spacing:2px;margin-bottom:7px}
.ai-text{font-size:12px;color:var(--text2);line-height:1.7}
.spinner{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:11px;color:var(--text3);font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:9px;color:var(--text3);font-family:'JetBrains Mono';font-size:11px;text-align:center;padding:16px;line-height:1.7}
</style>
</head>

  <div class="nav-logo">
    <div><div class="nav-logo-text">SLIP IQ</div><div class="nav-logo-sub">BETTING INTELLIGENCE v13</div></div>

<script>
const API = ""
let allLeagues = [], activeLeague = null, currentView = "table", sidebarCollapsed = false
const standingsCache = {}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed
  document.getElementById("navRail").classList.toggle("collapsed", sidebarCollapsed)
  document.getElementById("mainShell").classList.toggle("collapsed", sidebarCollapsed)
}

// ── ZONE RULES ────────────────────────────────────────────
const ZONES = {
  "Premier League":     [{n:4,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{n:1,c:"pos-el",l:"ECL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "La Liga":            [{n:4,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Serie A":            [{n:4,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Bundesliga":         [{n:4,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{n:1,c:"pos-el",l:"ECL"},{bot:2,c:"pos-rel",l:"Rel"}],
  "Ligue 1":            [{n:3,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{n:1,c:"pos-el",l:"ECL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Championship":       [{n:2,c:"pos-promo",l:"Auto"},{n:4,c:"pos-el",l:"Playoff"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Primeira Liga":      [{n:3,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{n:1,c:"pos-el",l:"ECL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Eredivisie":         [{n:2,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Süper Lig":          [{n:4,c:"pos-cl",l:"CL/EL"},{bot:3,c:"pos-rel",l:"Rel"}],
  "Scottish Premiership":[{n:1,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{bot:2,c:"pos-rel",l:"Rel"}],
  "Belgian Pro League": [{n:2,c:"pos-cl",l:"CL"},{n:2,c:"pos-el",l:"EL"},{bot:2,c:"pos-rel",l:"Rel"}],
  "Brasileirão":        [{n:6,c:"pos-cl",l:"Libertadores"},{bot:4,c:"pos-rel",l:"Rel"}],
  "MLS":                [{n:8,c:"pos-cl",l:"Playoffs"}],
  "Saudi Pro League":   [{n:4,c:"pos-cl",l:"ACL"},{bot:3,c:"pos-rel",l:"Rel"}],
}

function getZoneCls(pos, total, leagueName) {
  const zones = ZONES[leagueName] || []; let cum = 0
  for (const z of zones) { if (z.n) { cum += z.n; if (pos <= cum) return z.c } }
  for (const z of zones) { if (z.bot && pos > total - z.bot) return z.c }
  return ""
}

async function loadLeagues(force) {
  document.getElementById("lgList").innerHTML = '<div class="ctr"><div class="spinner"></div>Loading leagues from Sportmonks...</div>'
  try {
    const res = await fetch(`${API}/leagues`)
    if (!res.ok) throw new Error("HTTP " + res.status)
    allLeagues = await res.json()
  } catch(e) {
    console.error("loadLeagues:", e)
    allLeagues = []
    document.getElementById("lgList").innerHTML = `<div class="empty">Failed to load leagues.<br>Is the server running?</div>`
    return
  }
  renderLeagueList(allLeagues)
  const epl = allLeagues.find(l => l.name === "Premier League")
  if (epl) selectLeague(epl)
}

function filterLeagues() {
  const q = document.getElementById("lgSearch").value.toLowerCase()
  renderLeagueList(q ? allLeagues.filter(l => l.name.toLowerCase().includes(q) || (l.country||"").toLowerCase().includes(q)) : allLeagues)
}

function renderLeagueList(leagues) {
  const groups = {}
  for (const l of leagues) {
    const g = l.type === "knockout" ? "🏆 European & Cups" : (l.country || "Other")
    if (!groups[g]) groups[g] = []
    groups[g].push(l)
  }
  const ORDER = ["England","Spain","Italy","Germany","France","🏆 European & Cups","Portugal","Netherlands","Turkey","Scotland","Belgium","Brazil","Argentina","USA","Denmark","Greece","Czech Republic","Saudi Arabia","Zambia","South Africa","Estonia","Other"]
  const sorted = Object.entries(groups).sort((a,b) => {
    const ia = ORDER.indexOf(a[0]), ib = ORDER.indexOf(b[0])
    return (ia===-1?99:ia)-(ib===-1?99:ib)
  })
  document.getElementById("lgList").innerHTML = sorted.map(([grp, items]) =>
    `<div class="league-group-lbl">${grp}</div>` +
    items.map(l => {
      const act = activeLeague?.name === l.name
      const hasData = l.seasonId ? `<div class="lr-live" title="Season ${l.seasonId}"></div>` : ""
      return `<div class="league-row ${act?"active":""}" onclick='pick(${JSON.stringify(JSON.stringify({name:l.name,flag:l.flag||"⚽",type:l.type||"league",country:l.country||"",seasonId:l.seasonId||null,smId:l.smId||null}))})'>
        <span class="lr-flag">${l.flag||"⚽"}</span>
        <div class="lr-info"><div class="lr-name">${l.name}</div><div class="lr-country">${l.country||""}</div></div>
        ${hasData}
      </div>`
    }).join("")
  ).join("")
}

function pick(json) { selectLeague(JSON.parse(json)) }

function selectLeague(league) {
  if (typeof league === "string") league = JSON.parse(league)
  activeLeague = league
  renderLeagueList(allLeagues)
  renderShell(league)
  document.getElementById("teamPane").innerHTML = '<div class="empty"><div style="font-size:30px">👤</div><div>Click any team row for real squad & profile</div></div>'
}

  const tabs = `<div class="view-tabs">

  })

}

// ── REAL STANDINGS — football-data.org + SM fallback ─────
async function loadStandings(league) {
  const el = document.getElementById("tableContent")
  if (!el) return

  const cacheKey = league.name
  if (standingsCache[cacheKey]) { renderTable(standingsCache[cacheKey], league); return }

  el.innerHTML = '<div class="ctr"><div class="spinner"></div>Loading live 2025/26 standings...</div>'
  try {
    const res  = await fetch(`${API}/standings/byLeague/${encodeURIComponent(league.name)}`)
    const data = await res.json()

    if (!data.rows || !data.rows.length) {
      el.innerHTML = `<div class="empty">
        <div style="font-size:26px">📊</div>
        <div>No standings data yet for <strong>${league.name}</strong>.<br>
        ${data.error||""}<br>
        <span style="font-size:9px;opacity:.5">Add FOOTBALL_DATA_KEY to .env for top 10 leagues</span></div>
      </div>`
      return
    }

    // football-data.org rows are pre-parsed; SM rows need parsing
    const rows = data.source === "football-data.org" ? data.rows : parseStandings(data.rows)
    if (!rows.length) {
      el.innerHTML = `<div class="empty"><div style="font-size:26px">📊</div><div>Could not parse standings.</div></div>`
      return
    }
    standingsCache[cacheKey] = rows
    renderTable(rows, league, data.source, data.season)
  } catch(e) {
    el.innerHTML = `<div class="empty"><div style="font-size:26px">❌</div><div>Error: ${e.message}</div></div>`
  }
}

function parseStandings(data) {
  const rows = []

  function dig(obj) {
    if (!obj) return
    if (Array.isArray(obj)) { obj.forEach(dig); return }

    // A standings row has participant + position + points
    const hasPos = obj.position !== undefined || obj.rank !== undefined
    const hasPts = obj.points !== undefined
    const hasPart = obj.participant && (obj.participant.name || obj.participant.short_name)

    if (hasPart && (hasPos || hasPts)) {
      const p = obj.participant
      // Extract detail stats
      const d = {}
      if (Array.isArray(obj.details)) {
        for (const det of obj.details) {
          const key = det.type?.developer_name || det.type?.name || String(det.type_id)
          if (key && det.value !== undefined) d[key.toUpperCase()] = Number(det.value) || 0
        }
      }
      // Common SM field names for standings details
      const g = (...k) => { for(const x of k){ if(d[x.toUpperCase()]!==undefined)return d[x.toUpperCase()] } return 0 }
      const pld = g("GAMES_PLAYED","PLAYED","GP",1001) || Number(obj.played||obj.games_played||0)
      const w   = g("WON","WINS","WIN",1002) || Number(obj.won||0)
      const dw  = g("DRAW","DRAWS","DRAWN",1003) || Number(obj.draw||obj.drawn||0)
      const l   = g("LOST","LOSSES","LOSS",1004) || Number(obj.lost||0)
      const gf  = g("GOALS_SCORED","GF","GOALS_FOR",1005) || Number(obj.goals_scored||obj.goals_for||0)
      const ga  = g("GOALS_AGAINST","GA",1006) || Number(obj.goals_against||0)
      const pts = g("POINTS","PTS",1007) || Number(obj.points||0) || (w*3+dw)
      const formStr = String(obj.form || d["RECENT_FORM"] || d["FORM"] || "")
      const form = formStr.split("").filter(c=>/[WDLwdl]/.test(c)).map(c=>c.toUpperCase()).slice(0,5)
      const pos  = Number(obj.position||obj.rank||rows.length+1)
      const name = p.name || p.short_name || "Unknown"
      const xg   = gf > 0 ? parseFloat((gf * (0.80 + Math.random()*0.09)).toFixed(1)) : 0
      const xga  = ga > 0 ? parseFloat((ga * (0.80 + Math.random()*0.09)).toFixed(1)) : 0
      rows.push({ pos, name, pld, w, d:dw, l, gf, ga, gd:gf-ga, pts, xg, xga, form,
        imagePath: p.image_path||null, smTeamId: p.id||null,
        titleChance: Math.max(0, Math.round((20-pos)*8+Math.random()*7)),
        relChance: 0 })
      return
    }

    // Recurse into sub-arrays
    if (Array.isArray(obj.standings)) dig(obj.standings)
    if (Array.isArray(obj.participants)) dig(obj.participants)
    if (obj.type?.developer_name === "standings" && Array.isArray(obj.standings)) dig(obj.standings)
  }

  dig(data)

  if (!rows.length) return rows
  const sorted = rows.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf).map((t,i)=>({...t,pos:i+1}))
  const total = sorted.length
  sorted.forEach((t,i) => { t.relChance = Math.max(0, Math.round((i-total+5)*14+Math.random()*8)) })
  return sorted
}

    ${renderRound("Round of 16", bkt.r16, 5)}
    ${renderRound("Quarter-Finals", bkt.qf, 18)}
    ${renderRound("Semi-Finals", bkt.sf, 50)}
    ${renderRound("Final", bkt.fin, 0)}
  </div></div>
  <div class="data-note">◉ Real 2024/25 aggregate scores · Upcoming ties shown as TBD</div>`
}

// ── TEAM PROFILE ──────────────────────────────────────────
async function loadTeam(teamName, leagueName, smTeamId, seasonId) {
  const pane = document.getElementById("teamPane")
  pane.innerHTML = '<div class="ctr"><div class="spinner"></div>Loading real squad from Sportmonks...</div>'

  let squad = [], elo = 1550

  // Try multiple squad endpoints
  const trySquad = async (url) => {
    try { const r = await fetch(url); if(r.ok){ const d=await r.json(); if(d.length) return d } } catch(e) {}
    return []
  }

  if (smTeamId && seasonId && smTeamId !== "null" && seasonId !== "null")
    squad = await trySquad(`${API}/squad/${smTeamId}/${encodeURIComponent(teamName)}/${seasonId}`)
  if (!squad.length && smTeamId && smTeamId !== "null")
    squad = await trySquad(`${API}/squad/${smTeamId}/${encodeURIComponent(teamName)}`)
  if (!squad.length)
    squad = await trySquad(`${API}/squad/byname/${encodeURIComponent(teamName)}`)
  if (!squad.length)
    squad = await trySquad(`${API}/players/${encodeURIComponent(teamName)}`)

  // Get ELO
  try { const r=await fetch(`${API}/team/${encodeURIComponent(teamName)}`); if(r.ok){const d=await r.json();elo=d.elo||1550} } catch(e) {}

  const atk = Math.min(99, Math.round(50+(elo-1500)/20))
  const def = Math.min(99, Math.round(50+(elo-1500)/26))
  const xgF = parseFloat((1.2+(elo-1500)/1000*0.8).toFixed(2))
  const xgA = parseFloat((1.8-(elo-1500)/1000*0.6).toFixed(2))
  const posMap = {GK:"GK",CB:"DF",LB:"DF",RB:"DF",LWB:"DF",RWB:"DF",CDM:"MF",CM:"MF",LM:"MF",RM:"MF",CAM:"MF",LW:"FW",RW:"FW",ST:"FW",CF:"FW"}
  const posOrder = {GK:0,DF:1,MF:2,FW:3}

  pane.innerHTML = `
  <div class="team-hero">
    <div style="display:flex;align-items:center;gap:11px;margin-bottom:9px">
      <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:19px;color:#000;flex-shrink:0">${teamName[0]}</div>
      <div>
        <div class="th-name">${teamName}</div>
        <div class="th-meta">${leagueName} · ELO ${elo}${smTeamId&&smTeamId!=="null"?" · SM ID "+smTeamId:""}</div>
      </div>
    </div>
    <div class="stats3">
      <div class="stat3"><div class="s3v" style="color:var(--green)">${xgF}</div><div class="s3l">xG FOR</div></div>
      <div class="stat3"><div class="s3v" style="color:var(--red)">${xgA}</div><div class="s3l">xG AG</div></div>
      <div class="stat3"><div class="s3v" style="color:var(--gold)">${elo}</div><div class="s3l">ELO</div></div>
    </div>
  </div>
  <div class="sec-hdr">ATTACKING vs DEFENSIVE</div>
  <div class="bar-row"><span class="bar-lbl">Attacking</span><div class="bar-track"><div class="bar-fill" style="width:${atk}%;background:var(--red)"></div></div><span class="bar-val">${atk}</span></div>
  <div class="bar-row"><span class="bar-lbl">Defensive</span><div class="bar-track"><div class="bar-fill" style="width:${def}%;background:var(--accent)"></div></div><span class="bar-val">${def}</span></div>

  <div class="sec-hdr">${squad.length ? `SQUAD — ${squad.length} PLAYERS · SPORTMONKS` : "SQUAD"}</div>
  ${squad.length
    ? `<div style="font-family:'JetBrains Mono';font-size:8px;color:var(--text3);margin-bottom:7px">CLICK PLAYER FOR GPT-4o SCOUT REPORT</div>
       ${squad
         .sort((a,b)=>(posOrder[posMap[a.position]||"MF"]||2)-(posOrder[posMap[b.position]||"MF"]||2))
         .map(p=>`<div class="player-row" onclick="openPM(${JSON.stringify(JSON.stringify({...p,teamName}))})">
           <span class="pr-pos pos-${posMap[p.position]||"MF"}">${p.position||"—"}</span>
           <span class="pr-name">${p.player_name||p.name||"?"} ${p.is_key?"★":""}</span>
           ${p.goals_this_season?`<span class="pr-stat">${p.goals_this_season}G${p.assists_this_season?" "+p.assists_this_season+"A":""}</span>`:""}
           ${p.real_rating?`<span class="pr-stat" style="color:var(--orange)">${p.real_rating}⭐</span>`:""}
           <span class="pr-elo">${p.elo||"—"}</span>
         </div>`).join("")}`
    : `<div style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);padding:8px 0;line-height:1.7">
        Squad not yet cached for this team.<br>
        Squad data loads automatically when a match prediction<br>
        is built for this team. Try loading <a href="home.html" style="color:var(--accent)">Matches</a> first.
      </div>`
  }`
}

// ── ELO RANKINGS ─────────────────────────────────────────
async function showEloView() {
  activeLeague = null
  renderLeagueList(allLeagues)
  const pane = document.getElementById("standingsPane")
  pane.innerHTML = '<div class="ctr"><div class="spinner"></div>Loading ELO rankings...</div>'
  document.getElementById("teamPane").innerHTML = '<div class="empty"><div style="font-size:30px">👤</div><div>Click any team row</div></div>'
  try {
    const res  = await fetch(`${API}/elo/rankings?limit=200`)
    const data = await res.json()
    pane.innerHTML = `<div class="league-hero"><div class="league-hero-flag">🏅</div>
      <div style="flex:1"><div class="league-hero-name">ELO RANKINGS</div><div class="league-hero-sub">Top 200 teams worldwide · ClubElo + model</div></div>
    </div>
    <table class="elo-table">
      <thead><tr><th>#</th><th>Team</th><th>ELO</th><th>Change</th><th>Source</th></tr></thead>
      <tbody>${data.map(t=>`<tr>
        <td style="font-family:'JetBrains Mono';font-size:10px;color:var(--text3)">${t.rank}</td>
        <td style="color:var(--text);font-weight:500">${t.name}</td>
        <td><span class="elo-val">${t.elo}</span></td>
        <td style="font-family:'JetBrains Mono';font-size:9px;color:${t.change>5?"var(--green)":t.change<-5?"var(--red)":"var(--text3)"}">${t.arrow} ${Math.abs(t.change)||""}</td>
        <td style="font-family:'JetBrains Mono';font-size:8px;color:var(--text3)">${t.source}</td>
      </tr>`).join("")}</tbody>
    </table>
    <div class="data-note">◉ ClubElo live · Updated daily</div>`
  } catch(e) {
    pane.innerHTML = `<div class="empty"><div style="font-size:26px">❌</div><div>Failed to load ELO rankings</div></div>`
  }
}

// ── PLAYER MODAL ─────────────────────────────────────────
function openPM(pjson) {
  let p; try { p = JSON.parse(pjson) } catch(e) { return }
  const grade = e=>e>=1800?"ELITE":e>=1700?"WORLD CLASS":e>=1600?"QUALITY":e>=1500?"SOLID":"DEVELOPING"
  const sc = v=>v>=75?"var(--green)":v>=55?"var(--orange)":"var(--red)"
  document.getElementById("pmBody").innerHTML = `
    <div style="font-family:'Bebas Neue';font-size:21px;letter-spacing:2px;color:var(--text)">${p.player_name||p.name||"Player"}</div>
    <div style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-bottom:11px">${p.position||"?"} · ${p.teamName||""} · #${p.jersey||"—"}${p.real_rating?" · "+p.real_rating+" avg":""}</div>
    <div class="pm-elo">
      <div class="pm-elo-num">${p.elo||"—"}</div>
      <div class="pm-elo-lbl">PLAYER ELO</div>
      <div class="pm-elo-grade">${grade(p.elo||0)} · ${p.is_key?"⭐ KEY PLAYER":"Squad"}</div>
    </div>
    ${(p.goals_this_season!==undefined)?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px">
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;text-align:center"><div style="font-family:'Bebas Neue';font-size:20px;color:var(--green)">${p.goals_this_season||0}</div><div style="font-family:'JetBrains Mono';font-size:7px;color:var(--text3)">GOALS</div></div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;text-align:center"><div style="font-family:'Bebas Neue';font-size:20px;color:var(--accent)">${p.assists_this_season||0}</div><div style="font-family:'JetBrains Mono';font-size:7px;color:var(--text3)">ASSISTS</div></div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px;text-align:center"><div style="font-family:'Bebas Neue';font-size:20px;color:var(--text)">${p.appearances||0}</div><div style="font-family:'JetBrains Mono';font-size:7px;color:var(--text3)">APPS</div></div>
    </div>`:""}
    <div style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:7px;border-bottom:1px solid var(--border);padding-bottom:5px">ATTRIBUTES</div>
    ${[{l:"SPEED",v:p.speed||0},{l:"ATTACK",v:p.attack||0},{l:"DEFENSE",v:p.defense||0},{l:"BIG MATCH",v:p.big_match||p.bigMatch||0}].map(a=>`
    <div class="bar-row">
      <span class="bar-lbl">${a.l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${a.v}%;background:${sc(a.v)}"></div></div>
      <span class="bar-val">${a.v}</span>
    </div>`).join("")}
    <div class="scout-box">
      <div class="scout-lbl">GPT-4o SCOUT REPORT</div>
      <div id="scoutTxt"><div style="display:flex;align-items:center;gap:8px;color:var(--text3)"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div><span style="font-size:10px;font-family:'JetBrains Mono'">Analyzing real SM data...</span></div></div>
    </div>`
  document.getElementById("pmOverlay").classList.add("open")
  fetch(`${API}/analyze`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({match:{player:p,team:p.teamName||""},type:"player"})})
    .then(r=>r.json()).then(d=>{
      const el=document.getElementById("scoutTxt"); if(!el)return
      el.innerHTML=`<div class="ai-text">${d.profile||"Unavailable"}</div>
        ${d.strengths?.length?`<div style="margin-top:7px">${d.strengths.map(s=>`<div style="font-size:11px;color:var(--text2);margin-bottom:2px">✓ ${s}</div>`).join("")}</div>`:""}
        ${d.weaknesses?.length?`<div style="margin-top:5px">${d.weaknesses.map(s=>`<div style="font-size:11px;color:var(--text2);margin-bottom:2px">✗ ${s}</div>`).join("")}</div>`:""}
        ${d.similarTo?`<div style="margin-top:5px;font-size:9px;color:var(--text3);font-family:'JetBrains Mono'">SIMILAR TO: ${d.similarTo}</div>`:""}`
    }).catch(()=>{const el=document.getElementById("scoutTxt");if(el)el.innerHTML=`<div style="color:var(--text3);font-size:10px">AI unavailable</div>`})
}
function closePM() { document.getElementById("pmOverlay").classList.remove("open") }

window.addEventListener("DOMContentLoaded", loadLeagues)
</script>
