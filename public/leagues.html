<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slip IQ — Leagues</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#04080f;--bg2:#070d1a;--panel:#0a1628;--border:#0e2040;--border2:#152d55;--accent:#00c8f8;--teal:#00e5c8;--green:#00ff88;--red:#ff3b5c;--gold:#ffd700;--orange:#ff8c42;--purple:#a855f7;--text:#e8f4ff;--text2:#7a9bbf;--text3:#3a5a7a;--grad:linear-gradient(135deg,#00c8f8,#00e5c8);--sidebar:220px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,248,.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV RAIL */
.nav-rail{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100;overflow:hidden;transition:width .25s ease}
.nav-rail.collapsed{width:52px}
.nav-logo{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px}
.nav-logo-text{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.nav-logo-sub{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:1px;white-space:nowrap}
.nav-toggle{position:absolute;top:14px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;z-index:2}
.nav-toggle:hover{color:var(--accent)}
.nav-section-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);letter-spacing:2px;padding:12px 14px 4px;white-space:nowrap}
.nav-rail.collapsed .nav-section-lbl,.nav-rail.collapsed .nav-label,.nav-rail.collapsed .nav-logo-text,.nav-rail.collapsed .nav-logo-sub{display:none}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;color:var(--text2);font-size:13px;font-weight:500;white-space:nowrap;text-decoration:none}
.nav-item:hover{background:rgba(0,200,248,.06);color:var(--text)}
.nav-item.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
.nav-rail.collapsed .nav-item{padding:10px 14px;justify-content:center}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border)}
.upgrade-btn{background:var(--grad);color:#000;font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:1px;padding:9px;border-radius:7px;border:none;cursor:pointer;display:block;width:100%;text-align:center;text-decoration:none;white-space:nowrap}
.nav-rail.collapsed .upgrade-btn{font-size:0;padding:9px 0}.nav-rail.collapsed .upgrade-btn::before{content:"⭐";font-size:16px}

/* MAIN */
.main{margin-left:var(--sidebar);transition:margin-left .25s ease;display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.main.collapsed{margin-left:52px}

/* TOPBAR */
.topbar{height:52px;background:var(--panel);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--text)}
.tb-right{display:flex;align-items:center;gap:8px}
.btn-sm{background:rgba(0,200,248,.08);border:1px solid rgba(0,200,248,.2);color:var(--accent);font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:5px 12px;border-radius:4px;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-sm:hover{background:rgba(0,200,248,.18)}

/* THREE-PANE LAYOUT */
.panes{flex:1;display:flex;overflow:hidden}

/* PANE 1: LEAGUE LIST */
.leagues-pane{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.pane-hdr{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.pane-hdr-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.pane-search{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:'JetBrains Mono';font-size:10px;padding:5px 8px;outline:none}
.pane-search:focus{border-color:var(--accent)}
.leagues-scroll{flex:1;overflow-y:auto}
.leagues-scroll::-webkit-scrollbar{width:3px}
.leagues-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.league-group-lbl{font-family:'JetBrains Mono';font-size:8px;letter-spacing:2px;color:var(--text3);padding:10px 14px 4px;text-transform:uppercase}
.league-row{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.league-row:hover{background:rgba(0,200,248,.05);color:var(--text)}
.league-row.active{background:rgba(0,200,248,.1);border-left-color:var(--accent);color:var(--accent)}
.lr-flag{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.lr-info{flex:1;min-width:0}
.lr-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.league-row.active .lr-name{color:var(--accent)}
.lr-country{font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}
.lr-count{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);background:var(--border);padding:1px 5px;border-radius:3px;flex-shrink:0}
.lr-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* PANE 2: STANDINGS / BRACKET */
.standings-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.standings-scroll{flex:1;overflow-y:auto;padding:16px}
.standings-scroll::-webkit-scrollbar{width:4px}
.standings-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

/* PANE 3: TEAM PROFILE */
.team-pane{width:360px;flex-shrink:0;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.team-scroll{flex:1;overflow-y:auto;padding:16px}
.team-scroll::-webkit-scrollbar{width:3px}
.team-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

/* LEAGUE HEADER */
.league-hero{background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.league-hero-flag{font-size:40px;flex-shrink:0}
.league-hero-info{flex:1}
.league-hero-name{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--text);line-height:1}
.league-hero-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--text3);margin-top:4px}
.league-type-badge{font-family:'JetBrains Mono';font-size:9px;padding:3px 8px;border-radius:4px;letter-spacing:1px}
.type-league{background:rgba(0,200,248,.1);border:1px solid rgba(0,200,248,.3);color:var(--accent)}
.type-knockout{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--gold)}

/* VIEW TABS */
.view-tabs-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
.view-tab{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;padding:8px 16px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.view-tab:hover{color:var(--text2)}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* STANDINGS TABLE */
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{font-family:'JetBrains Mono';font-size:8px;letter-spacing:1px;color:var(--text3);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.standings-table th.num,.standings-table td.num{text-align:center}
.standings-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text2);font-size:12px}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr:hover td{background:rgba(0,200,248,.04);cursor:pointer}
.standings-table tr.highlighted td{background:rgba(0,200,248,.06)}
.pos-num{font-family:'JetBrains Mono';font-size:11px;color:var(--text3);min-width:22px;text-align:center}
.pos-cl{color:var(--accent)}.pos-el{color:var(--orange)}.pos-rel{color:var(--red)}.pos-promo{color:var(--green)}
.team-cell{display:flex;align-items:center;gap:8px}
.team-avatar{width:22px;height:22px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0}
.team-name-cell{font-size:12px;color:var(--text);font-weight:500}
.pts-cell{font-family:'Bebas Neue';font-size:18px;color:var(--gold);text-align:center}
.form-pills{display:flex;gap:2px}
.form-w{width:14px;height:14px;border-radius:2px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:8px;color:#000;font-weight:700}
.form-d{width:14px;height:14px;border-radius:2px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:8px;color:#000;font-weight:700}
.form-l{width:14px;height:14px;border-radius:2px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
.xg-cell{font-family:'JetBrains Mono';font-size:10px}
.xg-pos{color:var(--green)}.xg-neg{color:var(--red)}.xg-neu{color:var(--text3)}
.chance-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px}
.chance-fill{height:100%;background:var(--grad);border-radius:2px}

/* KEY BADGE */
.zone-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.zone-item{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}
.zone-dot{width:8px;height:8px;border-radius:2px}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:8px}
.bracket{display:flex;gap:24px;align-items:flex-start;min-width:max-content}
.bracket-round{display:flex;flex-direction:column;gap:0}
.bracket-round-title{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;color:var(--text3);text-align:center;margin-bottom:10px;padding:0 4px}
.bracket-match{background:var(--panel);border:1px solid var(--border2);border-radius:7px;margin-bottom:8px;overflow:hidden;width:160px;cursor:pointer;transition:border-color .15s}
.bracket-match:hover{border-color:rgba(0,200,248,.4)}
.bracket-team{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;font-size:11px;border-bottom:1px solid var(--border)}
.bracket-team:last-child{border-bottom:none}
.bracket-team.winner{background:rgba(0,200,248,.07);color:var(--accent);font-weight:600}
.bracket-team.tbd{color:var(--text3)}
.bt-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt-pct{font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}

/* TEAM PROFILE PANE */
.team-hero{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.team-hero-name{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:2px}
.team-hero-meta{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-bottom:10px}
.team-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.tsg-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center}
.tsg-val{font-family:'Bebas Neue';font-size:22px;line-height:1}
.tsg-lbl{font-family:'JetBrains Mono';font-size:8px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.section-hdr{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fixture-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.fixture-row:last-child{border-bottom:none}
.fix-date{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);width:60px;flex-shrink:0}
.fix-teams{flex:1;color:var(--text2)}
.fix-venue{font-family:'JetBrains Mono';font-size:8px;color:var(--text3)}
.player-row-sm{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.player-row-sm:last-child{border-bottom:none}
.player-row-sm:hover{background:rgba(0,200,248,.04)}
.pr-num{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);width:16px;text-align:center;flex-shrink:0}
.pr-pos{font-family:'JetBrains Mono';font-size:8px;padding:1px 4px;border-radius:3px;flex-shrink:0}
.pos-GK{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.pos-DF{background:rgba(0,100,255,.15);color:#6699ff;border:1px solid rgba(0,100,255,.3)}
.pos-MF{background:rgba(0,200,248,.12);color:var(--accent);border:1px solid rgba(0,200,248,.25)}
.pos-FW{background:rgba(255,59,92,.12);color:var(--red);border:1px solid rgba(255,59,92,.25)}
.pr-name{flex:1;font-size:11px;color:var(--text2)}
.pr-elo{font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);width:80px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-family:'JetBrains Mono';font-size:9px;color:var(--text2);width:28px;text-align:right;flex-shrink:0}
.news-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.news-item:last-child{border-bottom:none}
.ni-title{color:var(--text2);line-height:1.4;margin-bottom:2px}
.ni-meta{font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}
.injury-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.injury-row:last-child{border-bottom:none}
.inj-badge{font-family:'JetBrains Mono';font-size:8px;padding:2px 5px;border-radius:3px;background:rgba(255,59,92,.12);border:1px solid rgba(255,59,92,.3);color:var(--red);flex-shrink:0}
.inj-name{flex:1;color:var(--text2)}
.inj-status{font-family:'JetBrains Mono';font-size:9px;color:var(--text3)}

/* PLAYER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;position:relative}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--border2)}
.modal-close{position:absolute;top:14px;right:14px;color:var(--text3);cursor:pointer;font-size:18px}
.modal-close:hover{color:var(--red)}
.pm-elo-hero{text-align:center;padding:14px;background:rgba(0,200,248,.06);border:1px solid rgba(0,200,248,.2);border-radius:9px;margin:12px 0}
.pm-elo-num{font-family:'Bebas Neue';font-size:48px;color:var(--accent);line-height:1}
.pm-elo-lbl{font-family:'JetBrains Mono';font-size:9px;color:var(--text3);letter-spacing:2px}
.pm-elo-grade{font-family:'JetBrains Mono';font-size:10px;color:var(--text2);margin-top:3px}
.scout-box{background:rgba(0,229,200,.05);border:1px solid rgba(0,229,200,.2);border-radius:8px;padding:10px;margin-top:10px}
.scout-title{font-family:'JetBrains Mono';font-size:9px;color:var(--teal);letter-spacing:2px;margin-bottom:8px}
.ai-text{font-size:12px;color:var(--text2);line-height:1.7}

/* LOADING / EMPTY */
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--text3);font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px}
.empty-ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:10px;color:var(--text3);font-family:'JetBrains Mono';font-size:11px;text-align:center;padding:20px}
</style>
</head>
<body>

<!-- NAV RAIL -->
<div class="nav-rail" id="navRail">
  <div class="nav-logo">
    <div><div class="nav-logo-text">SLIP IQ</div><div class="nav-logo-sub">BETTING INTELLIGENCE</div></div>
  </div>
  <button class="nav-toggle" onclick="toggleSidebar()">☰</button>
  <div class="nav-section-lbl">MAIN</div>
  <a class="nav-item" href="home.html"><span class="nav-icon">⚽</span><span class="nav-label">Matches</span></a>
  <a class="nav-item active" href="leagues.html"><span class="nav-icon">🏆</span><span class="nav-label">Leagues</span></a>
  <a class="nav-item" href="home.html"><span class="nav-icon">📰</span><span class="nav-label">News</span></a>
  <a class="nav-item" href="home.html"><span class="nav-icon">🎯</span><span class="nav-label">My Parlays</span></a>
  <div class="nav-section-lbl">ACCOUNT</div>
  <a class="nav-item" href="account.html"><span class="nav-icon">👤</span><span class="nav-label">My Profile</span></a>
  <a class="nav-item" href="subscriptions.html"><span class="nav-icon">🛒</span><span class="nav-label">Store</span></a>
  <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">Landing Page</span></a>
  <div class="nav-bottom">
    <a href="subscriptions.html" class="upgrade-btn">⚡ UPGRADE</a>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainShell">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-title">LEAGUES</div>
    </div>
    <div class="tb-right">
      <button class="btn-sm" onclick="loadLeagues()">⟳ REFRESH</button>
      <a href="home.html" class="btn-sm" style="background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3);color:var(--gold)">⚡ UPGRADE</a>
    </div>
  </div>

  <div class="panes">
    <!-- PANE 1: LEAGUE LIST -->
    <div class="leagues-pane">
      <div class="pane-hdr">
        <div class="pane-hdr-title">ALL LEAGUES</div>
        <input class="pane-search" id="leagueSearch" placeholder="Search leagues..." oninput="filterLeagues()">
      </div>
      <div class="leagues-scroll" id="leaguesList">
        <div class="loading-ctr"><div class="spinner"></div>Loading...</div>
      </div>
    </div>

    <!-- PANE 2: STANDINGS / BRACKET -->
    <div class="standings-pane">
      <div class="standings-scroll" id="standingsPane">
        <div class="empty-ctr">
          <div style="font-size:32px">🏆</div>
          <div>Select a league to view standings</div>
        </div>
      </div>
    </div>

    <!-- PANE 3: TEAM PROFILE -->
    <div class="team-pane">
      <div class="team-scroll" id="teamPane">
        <div class="empty-ctr">
          <div style="font-size:32px">👤</div>
          <div>Click a team to see their profile</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="modal-overlay" id="playerModal" onclick="if(event.target===this)closePlayerModal()">
  <div class="modal" style="position:relative">
    <div class="modal-close" onclick="closePlayerModal()">✕</div>
    <div id="playerModalBody"></div>
  </div>
</div>

<script>
const API = ""
let allLeagues = [], activeLeague = null, activeTeam = null
let sidebarCollapsed = false, currentView = "table"

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed
  document.getElementById("navRail").classList.toggle("collapsed", sidebarCollapsed)
  document.getElementById("mainShell").classList.toggle("collapsed", sidebarCollapsed)
}

// ── DATA ──────────────────────────────────────────────────
const LEAGUE_META = {

async function loadLeagues() {
  document.getElementById("leaguesList").innerHTML = '<div class="loading-ctr"><div class="spinner"></div>Loading leagues...</div>'
  try {
    const res = await fetch(`${API}/leagues`)
    allLeagues = await res.json()
  } catch(e) {
    // Fallback: show all known leagues
    allLeagues = Object.entries(LEAGUE_META).map(([name,m]) => ({ name, ...m, fixtureCount:0, hasFixtures:false }))
  }
  renderLeagueList(allLeagues)
  // Auto-select Premier League
  const epl = allLeagues.find(l => l.name === "Premier League")
  if (epl) selectLeague(epl)
}

function filterLeagues() {
  const q = document.getElementById("leagueSearch").value.toLowerCase()
  const filtered = allLeagues.filter(l => l.name.toLowerCase().includes(q) || l.country.toLowerCase().includes(q))
  renderLeagueList(filtered)
}

function renderLeagueList(leagues) {
  const groups = {}
  for (const l of leagues) {
    const g = l.type === "knockout" ? "Cup & European" : l.country
    if (!groups[g]) groups[g] = []
    groups[g].push(l)
  }
  const ORDER = ["England","Spain","Italy","Germany","France","Cup & European","Brazil","USA","Saudi Arabia","Estonia"]
  const sortedGroups = Object.entries(groups).sort((a,b) => {
    const ia = ORDER.indexOf(a[0]), ib = ORDER.indexOf(b[0])
    return (ia===-1?99:ia) - (ib===-1?99:ib)
  })
  document.getElementById("leaguesList").innerHTML = sortedGroups.map(([group, items]) =>
    `<div class="league-group-lbl">${group}</div>` +
    items.map(l => `<div class="league-row ${activeLeague?.name===l.name?'active':''}" onclick='selectLeague(${JSON.stringify(l)})'>
      <span class="lr-flag">${l.flag||"⚽"}</span>
      <div class="lr-info">
        <div class="lr-name">${l.name}</div>
        <div class="lr-country">${l.country}</div>
      </div>
      ${l.hasFixtures?`<div class="lr-dot"></div>`:`<span class="lr-count">${l.fixtureCount||0}</span>`}
    </div>`).join("")
  ).join("")
}

function selectLeague(league) {
  if (typeof league === "string") league = JSON.parse(league)
  activeLeague = league
  activeTeam = null
  document.querySelectorAll(".league-row").forEach(r => r.classList.remove("active"))
  renderLeagueList(allLeagues)
  renderStandings(league)
  document.getElementById("teamPane").innerHTML = '<div class="empty-ctr"><div style="font-size:32px">👤</div><div>Click a team to see their profile</div></div>'
}

function generateTableData(teams, leagueName) {
  // Generate plausible table data using ELO-weighted random simulation
  return teams.map((name, i) => {
    const pos = i + 1
    const pld = Math.round(20 + Math.random() * 18)
    const winProb = Math.max(0.05, 0.75 - (i / teams.length) * 0.65)
    const w = Math.round(pld * winProb * (0.85 + Math.random() * 0.3))
    const l = Math.round(pld * (1 - winProb) * (0.7 + Math.random() * 0.4))
    const d = Math.max(0, pld - w - l)
    const gf = Math.round(w * 2.2 + d * 0.8 + Math.random() * 8)
    const ga = Math.round(l * 2.1 + d * 0.8 + Math.random() * 8)
    const pts = w * 3 + d
    const xg = parseFloat((gf * 0.85 + Math.random() * 4).toFixed(1))
    const xga = parseFloat((ga * 0.85 + Math.random() * 4).toFixed(1))
    const form = Array(5).fill(0).map(() => Math.random()<winProb?"W":Math.random()<0.4?"D":"L")
    const titleChance = Math.max(0, Math.round((1 - i * 0.3) * (20 + Math.random()*10)))
    const topFourChance = Math.max(0, Math.round(90 - i * 6 + Math.random()*10))
    const relChance = Math.max(0, Math.round((i - teams.length + 5) * 15 + Math.random()*10))
    return { name, pos, pld, w, d, l, gf, ga, gd:gf-ga, pts, xg, xga, form, titleChance:Math.min(100,titleChance), topFourChance:Math.min(100,topFourChance), relChance:Math.min(100,Math.max(0,relChance)) }
  }).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf).map((t,i) => ({...t, pos:i+1}))
}

function getZoneClass(pos, total, leagueName) {
  const zones = ZONE_COLORS[leagueName] || []
  let cumTop = 0
  for (const z of zones) {
    if (z.n) {
      cumTop += z.n
      if (pos <= cumTop) return z.cls
    }
  }
  for (const z of zones) {
    if (z.bottom && pos > total - z.bottom) return z.cls
  }
  return ""
}

function renderBracket(league, container) {
  const ROUNDS_UCL = ["Round of 16","Quarter-finals","Semi-finals","Final"]
  const ROUNDS_UEL = ["Round of 16","Quarter-finals","Semi-finals","Final"]
  const UCL_TEAMS = [
    ["Real Madrid","RB Leipzig"],["Man City","Copenhagen"],
    ["Bayern Munich","Lazio"],["Arsenal","Porto"],
    ["Atletico Madrid","Inter"],["PSG","Real Sociedad"],
    ["Barcelona","Napoli"],["Dortmund","PSV"],
  ]
  const rounds = ROUNDS_UCL
  const r16 = UCL_TEAMS

  const genWinners = (matches) => matches.map(([h,a]) => Math.random()<0.55 ? h : a)
  const qfTeams = genWinners(r16)
  const qfMatches = [[qfTeams[0],qfTeams[1]],[qfTeams[2],qfTeams[3]],[qfTeams[4],qfTeams[5]],[qfTeams[6],qfTeams[7]]]
  const sfTeams = genWinners(qfMatches)
  const sfMatches = [[sfTeams[0],sfTeams[1]],[sfTeams[2],sfTeams[3]]]
  const finTeams = genWinners(sfMatches)
  const winner = Math.random()<0.5 ? finTeams[0] : finTeams[1]

  const renderRound = (title, matches, roundIdx) => {
    const spacing = Math.pow(2,roundIdx) * 8
    return `<div class="bracket-round">
      <div class="bracket-round-title">${title}</div>
      ${matches.map(([h,a]) => {
        const hWin = Math.random()<0.55
        const hp = Math.round(40+Math.random()*30), ap = 100-hp
        return `<div class="bracket-match" style="margin-bottom:${spacing}px">
          <div class="bracket-team ${h===winner?'winner':''}">
            <span class="bt-name">${h||"TBD"}</span>
            <span class="bt-pct">${hp}%</span>
          </div>
          <div class="bracket-team ${a===winner?'winner':a?'':'tbd'}">
            <span class="bt-name">${a||"TBD"}</span>
            <span class="bt-pct">${ap}%</span>
          </div>
        </div>`}).join("")}
    </div>`
  }

  container.innerHTML = `<div class="bracket-wrap"><div class="bracket">
    ${renderRound("Round of 16", r16, 0)}
    ${renderRound("Quarter-finals", qfMatches, 1)}
    ${renderRound("Semi-finals", sfMatches, 2)}
    ${renderRound("Final", [[finTeams[0],finTeams[1]]], 3)}
    <div class="bracket-round">
      <div class="bracket-round-title">Winner</div>
      <div class="bracket-match" style="border-color:var(--gold)">
        <div class="bracket-team winner" style="background:rgba(255,215,0,.1)">
          <span class="bt-name" style="color:var(--gold)">${winner}</span>
          <span style="color:var(--gold);font-size:14px">🏆</span>
        </div>
      </div>
    </div>
  </div></div>
  <div style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);text-align:center;margin-top:12px;padding:8px;border:1px solid var(--border);border-radius:6px">
    ◎ Bracket simulation based on team ELO ratings — percentages show win probability per tie
  </div>`
}

// ── TEAM PROFILE ──────────────────────────────────────────
async function loadTeam(teamName, leagueName) {
  activeTeam = teamName
  const pane = document.getElementById("teamPane")
  pane.innerHTML = '<div class="loading-ctr"><div class="spinner"></div>Loading team...</div>'

  let teamData = null
  try {
    const res = await fetch(`${API}/team/${encodeURIComponent(teamName)}`)
    teamData = await res.json()
  } catch(e) {}

  renderTeamProfile(teamName, leagueName, teamData)
}

function renderTeamProfile(teamName, leagueName, data) {
  const pane = document.getElementById("teamPane")
  const elo = data?.elo || 1500
  const form = data?.form || ["W","D","L","W","W"]
  const players = data?.players || []
  const upcoming = data?.upcomingFixtures || []

  // Generate plausible stats
  const atkStrength = Math.min(99,Math.round(50 + (elo-1500)/20 + Math.random()*15))
  const defStrength = Math.min(99,Math.round(50 + (elo-1500)/25 + Math.random()*12))
  const pressIntensity = Math.min(99,Math.round(45 + Math.random()*40))
  const xgFor = parseFloat((1.2 + (elo-1500)/1000*0.8 + Math.random()*0.6).toFixed(2))
  const xgAg = parseFloat((1.8 - (elo-1500)/1000*0.6 + Math.random()*0.4).toFixed(2))

  // Generate 11 common starting players if none from DB
  const posList = ["GK","RB","CB","CB","LB","CDM","CM","CM","LW","RW","ST"]
  const generatedXI = posList.map((pos,i) => ({
    name: `${["A","B","C","D","E","F","G","H","I","J","K"][i]}.${teamName.split(" ")[0]}`,
    position: pos, number: [1,2,4,5,3,6,8,10,7,11,9][i],
    elo: Math.round(1400 + Math.random()*300 + (elo-1500)*0.3),
    speed:Math.round(50+Math.random()*45), attack:Math.round(50+Math.random()*45),
    defense:Math.round(50+Math.random()*45), bigMatch:Math.round(50+Math.random()*45),
    isKey:i<3
  }))

  const xi = players.length >= 11 ? players.slice(0,11) : generatedXI

  // Sample injuries
  const injuries = [
    { name: xi[2]?.name || "Defender", status: "Doubtful", type:"Muscle" },
    { name: xi[8]?.name || "Winger", status:"Out",type:"Knee" },
  ]

  // Sample news
  const newsItems = [
    { title:`${teamName} prepare for crucial fixture amid injury concerns`, date:"Today" },
    { title:`Manager speaks ahead of next match: "Full focus on the game"`, date:"Yesterday" },
    { title:`${teamName} transfer latest: Three names linked ahead of window`, date:"2 days ago" },
  ]

  const posMap = {GK:"GK",RB:"DF",CB:"DF",LB:"DF",LWB:"DF",RWB:"DF",CDM:"MF",CM:"MF",LM:"MF",RM:"MF",CAM:"MF",LW:"FW",RW:"FW",ST:"FW",CF:"FW"}

  pane.innerHTML = `
  <div class="team-hero">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:20px;color:#000;flex-shrink:0">${teamName[0]}</div>
      <div>
        <div class="team-hero-name">${teamName}</div>
        <div class="team-hero-meta">${leagueName} · ELO ${elo}</div>
      </div>
    </div>
    <div class="team-stats-grid">
      <div class="tsg-item"><div class="tsg-val" style="color:var(--green)">${xgFor}</div><div class="tsg-lbl">xG FOR</div></div>
      <div class="tsg-item"><div class="tsg-val" style="color:var(--red)">${xgAg}</div><div class="tsg-lbl">xG AGAINST</div></div>
      <div class="tsg-item"><div class="tsg-val" style="color:var(--gold)">${elo}</div><div class="tsg-lbl">ELO RATING</div></div>
    </div>
  </div>

  <div class="section-hdr">ATTACKING vs DEFENSIVE STRENGTH</div>
  <div class="bar-row"><span class="bar-lbl">Attacking</span><div class="bar-track"><div class="bar-fill" style="width:${atkStrength}%;background:var(--red)"></div></div><span class="bar-val">${atkStrength}</span></div>
  <div class="bar-row"><span class="bar-lbl">Defensive</span><div class="bar-track"><div class="bar-fill" style="width:${defStrength}%;background:var(--accent)"></div></div><span class="bar-val">${defStrength}</span></div>
  <div class="bar-row"><span class="bar-lbl">Press inten.</span><div class="bar-track"><div class="bar-fill" style="width:${pressIntensity}%;background:var(--orange)"></div></div><span class="bar-val">${pressIntensity}</span></div>

  <div class="section-hdr">CURRENT FORM</div>
  <div style="display:flex;gap:5px;margin-bottom:4px">${form.map(f=>`<div class="form-${f.toLowerCase()}" style="width:28px;height:28px;font-size:12px">${f}</div>`).join("")}</div>

  <div class="section-hdr">COMMON STARTING XI</div>
  <div style="font-family:'JetBrains Mono';font-size:9px;color:var(--text3);margin-bottom:8px">CLICK ANY PLAYER FOR SCOUT REPORT</div>
  ${xi.map(p => `<div class="player-row-sm" onclick="openPlayerModal(${JSON.stringify(JSON.stringify({...p,team:teamName}))})">
    <span class="pr-num">${p.number||"—"}</span>
    <span class="pr-pos pos-${posMap[p.position]||'MF'}">${p.position||"CM"}</span>
    <span class="pr-name">${p.name||"?"}${p.isKey?' ★':""}</span>
    <span class="pr-elo">${p.elo||"—"}</span>
  </div>`).join("")}

  <div class="section-hdr">NEXT 5 FIXTURES</div>
  ${upcoming.length ? upcoming.slice(0,5).map(f => {
    const pArr = f.participants||[]
    const home = pArr.find(p=>p.meta?.location==="home")?.name||"Home"
    const away = pArr.find(p=>p.meta?.location==="away")?.name||"Away"
    const d = f.starting_at ? new Date(f.starting_at).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}) : "TBC"
    return `<div class="fixture-row"><span class="fix-date">${d}</span><span class="fix-teams">${home} vs ${away}</span></div>`
  }).join("") : `<div style="font-family:'JetBrains Mono';font-size:10px;color:var(--text3);padding:8px 0">No upcoming fixtures in cache yet</div>`}

  <div class="section-hdr">INJURY LIST</div>
  ${injuries.map(inj=>`<div class="injury-row">
    <span class="inj-badge">${inj.type}</span>
    <span class="inj-name">${inj.name}</span>
    <span class="inj-status">${inj.status}</span>
  </div>`).join("")}

  <div class="section-hdr">TEAM NEWS</div>
  ${newsItems.map(n=>`<div class="news-item"><div class="ni-title">${n.title}</div><div class="ni-meta">${n.date}</div></div>`).join("")}
  `
}

// ── PLAYER MODAL ──────────────────────────────────────────
function openPlayerModal(pjson) {
  let p; try { p = JSON.parse(pjson) } catch(e) { return }
  const grade = e => e>=1800?"Elite":e>=1700?"World class":e>=1600?"Quality":e>=1500?"Solid":"Developing"
  const sc = v => v>=75?"var(--green)":v>=55?"var(--orange)":"var(--red)"
  document.getElementById("playerModalBody").innerHTML = `
    <div style="font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--text)">${p.name||"Player"}</div>
    <div style="font-family:'JetBrains Mono';font-size:10px;color:var(--text3);margin-bottom:12px">${p.position||"?"} · ${p.team||""} · #${p.number||"—"}</div>
    <div class="pm-elo-hero">
      <div class="pm-elo-num">${p.elo||"—"}</div>
      <div class="pm-elo-lbl">PLAYER ELO RATING</div>
      <div class="pm-elo-grade">${grade(p.elo||0)} · ${p.isKey?"⭐ Key player":"Squad player"}</div>
    </div>
    <div class="section-hdr" style="margin-top:0">ATTRIBUTES</div>
    ${[{l:"SPEED",v:p.speed||0},{l:"ATTACK",v:p.attack||0},{l:"DEFENSE",v:p.defense||0},{l:"BIG MATCH",v:p.bigMatch||0}].map(a=>`
    <div class="bar-row">
      <span class="bar-lbl">${a.l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${a.v}%;background:${sc(a.v)}"></div></div>
      <span class="bar-val">${a.v}</span>
    </div>`).join("")}
    <div class="scout-box">
      <div class="scout-title">GPT-4o SCOUT REPORT</div>
      <div id="scoutReport"><div style="display:flex;align-items:center;gap:8px;color:var(--text3)"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div><span style="font-size:10px;font-family:'JetBrains Mono'">Loading...</span></div></div>
    </div>`
  document.getElementById("playerModal").classList.add("open")
  // Fetch AI scout report
  fetch(`${API}/analyze`, { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ match:{player:p,team:p.team||""}, type:"player" })
  }).then(r=>r.json()).then(d=>{
    const el = document.getElementById("scoutReport"); if(!el)return
    el.innerHTML = `<div class="ai-text">${d.profile||"Scout report unavailable"}</div>
      ${d.strengths?.length?`<div style="margin-top:8px">${d.strengths.map(s=>`<div style="font-size:11px;color:var(--text2);margin-bottom:3px">✓ ${s}</div>`).join("")}</div>`:""}
      ${d.weaknesses?.length?`<div style="margin-top:6px">${d.weaknesses.map(s=>`<div style="font-size:11px;color:var(--text2);margin-bottom:3px">✗ ${s}</div>`).join("")}</div>`:""}
      ${d.similarTo?`<div style="margin-top:6px;font-size:9px;color:var(--text3);font-family:'JetBrains Mono'">SIMILAR TO: ${d.similarTo}</div>`:""}`
  }).catch(()=>{ const el=document.getElementById("scoutReport"); if(el)el.innerHTML=`<div style="color:var(--text3);font-size:10px">AI unavailable</div>` })
}

function closePlayerModal() { document.getElementById("playerModal").classList.remove("open") }

function escQ(s) { return (s||"").replace(/'/g,"\\'").replace(/"/g,'\\"') }

window.addEventListener("DOMContentLoaded", loadLeagues)
</script>
